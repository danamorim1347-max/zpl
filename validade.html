<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coletor Cloud | Gestão de Estoque</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --border: #e5e7eb;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .dark-mode {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #374151;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            max-width: 400px;
            animation: slideIn 0.3s ease forwards;
            border-left: 4px solid;
            pointer-events: auto;
            color: var(--text-primary);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.info { border-left-color: var(--accent); }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: var(--success); color: white; }
        .toast.error .toast-icon { background: var(--danger); color: white; }
        .toast.warning .toast-icon { background: var(--warning); color: white; }
        .toast.info .toast-icon { background: var(--accent); color: white; }

        .toast-content {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
            word-break: break-word;
        }

        .toast-close {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        .toast.fade-out {
            animation: slideOut 0.3s ease forwards;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .theme-toggle, .export-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .theme-toggle:hover, .export-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Upload Tabs */
        .upload-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .upload-tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            background: var(--bg-secondary);
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }

        .upload-tab.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Upload Cards */
        .upload-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }

        .upload-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(79, 70, 229, 0.05);
        }

        .upload-area i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .upload-area span {
            font-weight: 600;
            color: var(--accent);
        }

        .upload-area small {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 8px;
        }

        /* Search Box */
        .search-box {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .search-label {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-search, .btn-scanner, .btn-compare {
            background: var(--text-primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            height: 50px;
            min-width: 50px;
        }

        .btn-search:hover, .btn-scanner:hover, .btn-compare:hover {
            background: var(--accent);
        }

        .btn-scanner {
            background: var(--accent);
        }

        .btn-compare {
            background: var(--warning);
        }

        /* Scanner */
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            background: var(--bg-secondary);
            padding: 10px;
        }

        /* Status Bar */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .status-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .status-card:hover {
            transform: translateY(-2px);
        }

        .status-card b {
            display: block;
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .status-card small {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Filter Section */
        .filter-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .filter-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-info span {
            font-weight: 600;
            color: var(--accent);
        }

        .filtros-rapidos {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .filtro-btn {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .filtro-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .filtro-btn:hover {
            background: var(--accent);
            color: white;
        }

        .ordenar-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
        }

        /* Products List */
        .produtos-list {
            margin-bottom: 20px;
        }

        .list-title {
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-title span {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .produto-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid;
            position: relative;
        }

        .produto-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow);
        }

        .produto-item.pendente { border-left-color: var(--warning); background: #fffbeb; }
        .produto-item.concluido { border-left-color: var(--success); opacity: 0.7; background: #f0fdf4; }
        .produto-item.sem-movimento-30 { border-left-color: #fbbf24; background: #fef3c7; }
        .produto-item.sem-movimento-60 { border-left-color: var(--warning); background: #fde68a; }
        .produto-item.sem-movimento-90 { border-left-color: var(--danger); background: #fee2e2; }
        .produto-item.sem-movimento-120 { border-left-color: var(--danger-dark); background: #fecaca; }

        .produto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .produto-codigo {
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .performance-icon {
            font-size: 1.2rem;
        }

        .produto-status {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .status-pendente { background: #fef3c7; color: var(--warning); }
        .status-concluido { background: #d1fae5; color: var(--success); }
        .status-parado-30 { background: #fef3c7; color: #d97706; }
        .status-parado-60 { background: #fde68a; color: #b45309; }
        .status-parado-90 { background: #fecaca; color: #b91c1c; }
        .status-parado-120 { background: #fecaca; color: #7f1d1d; font-weight: 800; }

        .produto-desc {
            font-size: 0.9rem;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .produto-detalhes {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .produto-endereco {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
        }

        .produto-movimento {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
            flex-wrap: wrap;
        }

        .badge-dias {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-30 { background: #fef3c7; color: #d97706; }
        .badge-60 { background: #fde68a; color: #b45309; }
        .badge-90 { background: #fecaca; color: #b91c1c; }
        .badge-120 { background: #fecaca; color: #7f1d1d; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            gap: 20px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 800;
            word-break: break-word;
            flex: 1;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        .modal-info {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .modal-info p {
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Teclado de Data */
        .teclado-container {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 15px;
            margin-top: 10px;
        }

        .data-input {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: var(--bg-secondary);
            cursor: pointer;
        }

        .teclado-meses, .teclado-anos {
            margin-bottom: 15px;
        }

        .teclado-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            text-align: center;
        }

        .meses-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .anos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-height: 120px;
            overflow-y: auto;
            padding: 5px;
        }

        .tecla-mes, .tecla-ano {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 5px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .tecla-mes:hover, .tecla-ano:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .tecla-mes.selecionado, .tecla-ano.selecionado {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .botoes-acao {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .botoes-acao .btn-salvar {
            flex: 1;
            margin: 0;
            font-size: 1rem;
            padding: 14px;
        }

        .botoes-acao .btn-salvar:first-child {
            background: var(--success);
        }

        .botoes-acao .btn-salvar:first-child:hover {
            background: #059669;
        }

        .botoes-acao .btn-salvar:last-child {
            background: var(--warning);
        }

        .botoes-acao .btn-salvar:last-child:hover {
            background: #d97706;
        }

        /* Lotes List */
        .lotes-list {
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .lote-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .lote-item:last-child {
            border-bottom: none;
        }

        .lote-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .lote-validade {
            font-weight: 700;
            color: var(--success);
        }

        .lote-qtd {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .btn-remover {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-remover:hover {
            background: var(--danger-dark);
        }

        /* Histórico */
        .historico-list {
            max-height: 200px;
            overflow-y: auto;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 10px;
        }

        .historico-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            gap: 10px;
            flex-wrap: wrap;
        }

        .historico-item:last-child {
            border-bottom: none;
        }

        .historico-data {
            color: var(--text-secondary);
        }

        .historico-qtd {
            font-weight: 700;
        }

        .historico-qtd.positivo { color: var(--success); }
        .historico-qtd.negativo { color: var(--danger); }

        .modal-input {
            width: 100%;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 600;
            margin: 10px 0;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-input:focus {
            border-color: var(--accent);
        }

        .btn-salvar, .btn-cancelar {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s;
        }

        .btn-salvar {
            background: var(--success);
            color: white;
        }

        .btn-salvar:hover {
            background: #059669;
        }

        .btn-cancelar {
            background: var(--danger);
            color: white;
        }

        .btn-cancelar:hover {
            background: var(--danger-dark);
        }

        .dica-enter {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
            text-align: center;
        }

        @media (max-width: 640px) {
            .container { padding: 10px; }
            .input-group { flex-direction: column; }
            .input-group input { width: 100%; }
            .btn-search, .btn-scanner, .btn-compare { width: 100%; height: 50px; }
            .toast { min-width: 250px; max-width: 300px; }
            .status-bar { grid-template-columns: repeat(2, 1fr); }
            .filtros-rapidos { justify-content: center; }
            .produto-header { flex-direction: column; align-items: flex-start; }
            .modal-content { padding: 20px; }
            .meses-grid { grid-template-columns: repeat(3, 1fr); }
            .anos-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 380px) {
            .status-bar { grid-template-columns: 1fr; }
            .produto-detalhes { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="container">
    <div class="header">
        <h1>📦 Coletor Cloud</h1>
        <div class="header-actions">
            <button class="export-btn" onclick="exportarRelatorioParados()" title="Exportar relatório">
                <i class="fas fa-download"></i>
            </button>
            <button class="theme-toggle" onclick="toggleDarkMode()" title="Alternar tema">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </div>

    <div class="upload-tabs">
        <div class="upload-tab active" onclick="mudarAba('xml')">📄 XML</div>
        <div class="upload-tab" onclick="mudarAba('estoque')">📦 PLANILHA</div>
    </div>

    <div id="aba-xml">
        <div class="upload-card">
            <div class="upload-title">📄 Importar XML</div>
            <label class="upload-area">
                <i class="fas fa-file-upload"></i>
                <span>SELECIONAR MÚLTIPLOS XMLs</span>
                <small>Clique para escolher os arquivos</small>

        <div class="upload-card">
            <div class="upload-title">📊 Importar Planilha</div>
            <label class="upload-area">
                <i class="fas fa-table"></i>
                <span>CARREGAR PLANILHA DE ESTOQUE</span>
                <small>Clique para escolher o arquivo</small>
                <input type="file" id="estoqueInput" accept=".xlsx,.xls,.csv" style="display:none">
            </label>
            <div id="estoque-status" style="font-size:0.85rem; color:var(--success); text-align:center;"></div>

            <button class="btn-scanner" onclick="alternarScanner()"><i class="fas fa-camera"></i></button>

            <b><span id="stat-pendentes">0</span></b>
            <small>PENDENTES</small>
        </div>
        <div class="status-card">
            <b><span id="stat-parados">0</span></b>
            <small>PARADOS</small>
        </div>
        <div class="status-card">
            <b><span id="stat-parados-90">0</span></b>

        <div class="filtros-rapidos">
            <button class="filtro-btn active" data-filtro="todos" onclick="aplicarFiltro('todos')">📋 Todos</button>
            <button class="filtro-btn" data-filtro="pendente" onclick="aplicarFiltro('pendente')">⏳ Pendentes</button>

            <button class="filtro-btn" data-filtro="parado30" onclick="aplicarFiltro('parado30')">🟡 +30d</button>
            <button class="filtro-btn" data-filtro="parado60" onclick="aplicarFiltro('parado60')">🟠 +60d</button>
            <button class="filtro-btn" data-filtro="parado90" onclick="aplicarFiltro('parado90')">🔴 +90d</button>
        </div>

        <select id="ordenarPor" class="ordenar-select" onchange="renderizarLista()">
            <option value="dias">⏰ Dias sem venda (maior)</option>
            <option value="dias-menor">⏰ Dias sem venda (menor)</option>

        </select>

    <div class="produtos-list">
        <div class="list-title">
            <span>📋 Produtos</span>
            <span id="result-count">0 itens</span>

        <div id="lista-estoque"></div>

</div>

<div class="modal" id="modalData">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="prodNome">Carregando...</h2>
            <div class="modal-close" onclick="fecharModal()">×</div>

        <div id="historicoContainer" style="margin-top: 20px;">
            <div style="font-weight:600; margin-bottom:10px;">📊 Histórico de movimentação:</div>
            <div id="historicoList" class="historico-list"></div>
        </div>

        <div id="inputContainer"></div>

        <button class="btn-cancelar" onclick="fecharModal()">FECHAR</button>
    </div>
</div>

<script>
    // Configuração do Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDr8Q2oJJ46ZANAjnV0_iSokdHnZ-YqGP4",
        authDomain: "controle-validade-de623.firebaseapp.com",
        projectId: "controle-validade-de623",
        storageBucket: "controle-validade-de623.firebasestorage.app",
        messagingSenderId: "788364390731",
        appId: "1:788364390731:web:6c92c01576a3c64ed7b8ce"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const estoqueRef = database.ref('estoque');
    const historicoRef = database.ref('historico');
    
    let inventario = {};
    let scanner = null;
    let refCodigoGlobal = null;
    let abaAtual = 'xml';
    let estoqueAnterior = null;
    let filtroAtual = 'todos';
    
    // Variáveis do teclado de data
    let mesSelecionado = '';
    let anoSelecionado = '';

    // Carregar dados
    estoqueRef.on('value', (snapshot) => {
        inventario = snapshot.val() || {};
        console.log('Dados carregados:', Object.keys(inventario).length, 'itens');
        atualizarStatus();
        renderizarLista();
    });

    // Funções de UI
    window.mostrarToast = (mensagem, tipo = 'success') => {
        const container = document.getElementById('toastContainer');
        const toastId = 'toast_' + Date.now() + '_' + Math.random();
        
        const icons = {
            success: '✓',
            error: '✗',
            warning: '⚠',
            info: 'ℹ'
        };
        
        const toast = document.createElement('div');
        toast.className = `toast ${tipo}`;
        toast.id = toastId;
        toast.innerHTML = `
            <div class="toast-icon">${icons[tipo]}</div>
            <div class="toast-content">${mensagem}</div>
            <div class="toast-close" onclick="fecharToast('${toastId}')">×</div>
        `;
        
        container.appendChild(toast);
        
        setTimeout(() => {
            const toastElement = document.getElementById(toastId);
            if (toastElement) {
                toastElement.classList.add('fade-out');
                setTimeout(() => {
                    if (toastElement.parentNode) {
                        toastElement.remove();
                    }
                }, 300);
            }
        }, 5000);
    };

    window.fecharToast = (id) => {
        const toast = document.getElementById(id);
        if (toast) {
            toast.classList.add('fade-out');
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.remove();
                }
            }, 300);
        }
    };

    window.toggleDarkMode = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
        
        const icon = document.querySelector('.theme-toggle i');
        if (isDark) {
            icon.classList.replace('fa-moon', 'fa-sun');
        } else {
            icon.classList.replace('fa-sun', 'fa-moon');
        }
        
        mostrarToast('Tema alterado!', 'info');
    };

    // Abas
    window.mudarAba = (aba) => {
        abaAtual = aba;
        document.querySelectorAll('.upload-tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById('aba-xml').style.display = 'none';
        document.getElementById('aba-estoque').style.display = 'none';
        
        if (aba === 'xml') {
            document.querySelectorAll('.upload-tab')[0].classList.add('active');
            document.getElementById('aba-xml').style.display = 'block';
            document.getElementById('filterText').innerText = 'Mostrando: APENAS PRODUTOS DE XML';
        } else {
            document.querySelectorAll('.upload-tab')[1].classList.add('active');
            document.getElementById('aba-estoque').style.display = 'block';
            document.getElementById('filterText').innerText = 'Mostrando: APENAS PRODUTOS DA PLANILHA';
        }
        
        renderizarLista();
    };

    // Upload XML
    document.getElementById('xmlInput').addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        let total = 0;
        let updates = {};

        for (let file of files) {
            try {
                const text = await file.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                
                const nNF = xml.querySelector('nNF')?.textContent || 'S/N';
                const itens = xml.querySelectorAll('det');

                for (let item of itens) {
                    const prod = item.querySelector('prod');
                    if (!prod) continue;
                    
                    const codigo = prod.querySelector('cProd')?.textContent?.trim() || '';
                    const desc = prod.querySelector('xProd')?.textContent?.trim() || '';
                    
                    let qtde = 0;
                    const qCom = prod.querySelector('qCom')?.textContent;
                    if (qCom) qtde = parseFloat(qCom.replace(',', '.'));
                    
                    if (!qtde) {
                        const qTrib = prod.querySelector('qTrib')?.textContent;
                        if (qTrib) qtde = parseFloat(qTrib.replace(',', '.'));
                    }
                    
                    if (qtde <= 0) continue;

                    const id = `XML_${nNF}_${codigo}_${Date.now()}_${total}`.replace(/[.#$\[\]\/]/g, "_");
                    
                    updates[`${id}`] = {
                        nf: nNF,
                        codigo: codigo,
                        desc: desc,
                        qtde: qtde,
                        validade: '',
                        done: false,
                        origem: 'xml',
                        ultimaVenda: null,
                        diasSemVenda: 0,
                        endereco: '',
                        historico: [{
                            data: Date.now(),
                            tipo: 'importacao',
                            quantidade: qtde,
                            origem: 'xml'
                        }]
                    };
                    total++;
                }
            } catch (error) {
                console.error(error);
                mostrarToast(`Erro no arquivo ${file.name}`, 'error');
            }
        }
        
        if (total > 0) {
            await estoqueRef.update(updates);
            mostrarToast(`${total} itens importados dos XMLs!`, 'success');
        }
        
        e.target.value = '';
    });

    // ===== UPLOAD PLANILHA CORRIGIDO - SEM DUPLICAÇÃO =====
    document.getElementById('estoqueInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const statusDiv = document.getElementById('estoque-status');
        const detalhesDiv = document.getElementById('estoque-detalhes');
        statusDiv.innerHTML = '<span class="loading"></span> Processando planilha...';
        detalhesDiv.innerHTML = '';
        
        try {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            
            // Mapa para agrupar por código (valores da planilha)
            const novosProdutos = new Map();
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 11) continue;
                
                const codigo = String(row[0] || '').trim();
                const desc = String(row[1] || '').trim();
                const qtde = parseFloat(String(row[8] || '0').replace(',', '.')) || 0;
                const estoqueMinimo = parseFloat(String(row[11] || '0').replace(',', '.')) || 0;
                
                // Extrair endereço completo
                const endereco = [row[4], row[5], row[6], row[7]]
                    .filter(c => c && String(c).trim())
                    .map(c => String(c).trim())
                    .join(' • ');
                
                if (codigo && desc) {
                    if (novosProdutos.has(codigo)) {
                        const existente = novosProdutos.get(codigo);
                        existente.qtde += qtde;
                    } else {
                        novosProdutos.set(codigo, {
                            codigo: codigo,
                            desc: desc,
                            qtde: qtde,
                            endereco: endereco,
                            estoqueMinimo: estoqueMinimo,
                            origem: 'planilha'
                        });
                    }
                }
            }
            
            // Salvar snapshot para comparação
            estoqueAnterior = JSON.parse(JSON.stringify(inventario));
            
            let atualizacoes = {};
            let produtosVendidos = 0;
            let produtosRepostos = 0;
            let produtosNovos = 0;
            let produtosAtualizados = 0;
            
            // ===== PROCESSAR CADA PRODUTO DA PLANILHA =====
            for (let [codigo, novoProduto] of novosProdutos) {
                // Buscar TODOS os lotes com este código (independente da origem)
                const existentes = Object.entries(inventario).filter(([_, item]) => item.codigo === codigo);
                
                if (existentes.length === 0) {
                    // Produto novo - cria um novo lote
                    const id = `ESTOQUE_${codigo}_${Date.now()}_${produtosNovos}`.replace(/[.#$\[\]\/]/g, "_");
                    atualizacoes[id] = {
                        ...novoProduto,
                        validade: '',
                        done: false,
                        ultimaVenda: null,
                        diasSemVenda: 0,
                        alertaEstoque: novoProduto.qtde <= novoProduto.estoqueMinimo,
                        historico: [{
                            data: Date.now(),
                            tipo: 'importacao',
                            quantidade: novoProduto.qtde,
                            origem: 'planilha'
                        }]
                    };
                    produtosNovos++;
                } else {
                    // Produto já existe - atualizar quantidades
                    const quantidadeAntiga = existentes.reduce((acc, [_, item]) => acc + (item.qtde || 0), 0);
                    const diferenca = novoProduto.qtde - quantidadeAntiga;
                    
                    if (diferenca !== 0) {
                        const tipoMovimento = diferenca < 0 ? 'venda' : 'reposicao';
                        const dataMovimento = Date.now();
                        
                        if (tipoMovimento === 'venda') {
                            produtosVendidos += Math.abs(diferenca);
                            
                            // Distribuir a venda entre os lotes existentes
                            for (let [id, item] of existentes) {
                                const historico = item.historico || [];
                                historico.push({
                                    data: dataMovimento,
                                    tipo: 'venda',
                                    quantidade: -Math.abs(diferenca) / existentes.length,
                                    origem: 'planilha'
                                });
                                
                                atualizacoes[id] = {
                                    ...item,
                                    qtde: Math.max(0, item.qtde - (Math.abs(diferenca) / existentes.length)),
                                    ultimaVenda: dataMovimento,
                                    alertaEstoque: (item.qtde - (Math.abs(diferenca) / existentes.length)) <= (item.estoqueMinimo || 0),
                                    historico: historico
                                };
                            }
                        } else {
                            produtosRepostos += diferenca;
                            
                            // Adicionar nova quantidade como um lote separado
                            const id = `ESTOQUE_${codigo}_${Date.now()}_${produtosRepostos}`.replace(/[.#$\[\]\/]/g, "_");
                            atualizacoes[id] = {
                                ...novoProduto,
                                validade: '',
                                done: false,
                                ultimaVenda: null,
                                alertaEstoque: novoProduto.qtde <= novoProduto.estoqueMinimo,
                                historico: [{
                                    data: dataMovimento,
                                    tipo: 'reposicao',
                                    quantidade: diferenca,
                                    origem: 'planilha'
                                }]
                            };
                        }
                        produtosAtualizados++;
                    }
                    
                    // Atualizar endereço se mudou
                    if (novoProduto.endereco && novoProduto.endereco !== 'S/E') {
                        for (let [id, item] of existentes) {
                            if (item.endereco !== novoProduto.endereco) {
                                atualizacoes[id] = {
                                    ...(atualizacoes[id] || item),
                                    endereco: novoProduto.endereco
                                };
                            }
                        }
                    }
                }
            }
            
            // Marcar produtos que sumiram da planilha (venderam tudo)
            for (let [id, item] of Object.entries(inventario)) {
                if (!novosProdutos.has(item.codigo) && item.qtde > 0) {
                    produtosVendidos += item.qtde;
                    
                    const historico = item.historico || [];
                    historico.push({
                        data: Date.now(),
                        tipo: 'venda',
                        quantidade: -item.qtde,
                        origem: 'planilha'
                    });
                    
                    atualizacoes[id] = {
                        ...item,
                        qtde: 0,
                        ultimaVenda: Date.now(),
                        alertaEstoque: true,
                        historico: historico,
                        done: true
                    };
                }
            }
            
            // Aplicar atualizações
            if (Object.keys(atualizacoes).length > 0) {
                await estoqueRef.update(atualizacoes);
                
                await historicoRef.push({
                    data: Date.now(),
                    tipo: 'importacao_planilha',
                    produtosVendidos: produtosVendidos,
                    produtosRepostos: produtosRepostos,
                    produtosNovos: produtosNovos,
                    produtosAtualizados: produtosAtualizados,
                    totalAtualizacoes: Object.keys(atualizacoes).length
                });
                
                statusDiv.innerHTML = `✅ ${Object.keys(atualizacoes).length} produtos atualizados!`;
                detalhesDiv.innerHTML = `
                    📉 Vendidos: ${produtosVendidos} un | 
                    📈 Repostos: ${produtosRepostos} un | 
                    🆕 Novos: ${produtosNovos} |
                    🔄 Atualizados: ${produtosAtualizados}
                `;
                
                mostrarToast(`Planilha processada! ${produtosVendidos} unidades vendidas`, 'success');
            } else {
                statusDiv.innerHTML = '⚠️ Nenhuma alteração detectada';
                mostrarToast('Estoque está igual ao anterior', 'info');
            }
            
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = '❌ Erro ao processar planilha';
            mostrarToast('Erro ao processar planilha: ' + error.message, 'error');
        }
        e.target.value = '';
    });

    // Busca
    window.buscarManual = () => {
        const termo = document.getElementById('manualCode').value.trim();
        if (termo) {
            abrirModal(termo);
        } else {
            mostrarToast('Digite um código para buscar', 'warning');
        }
    };

    // Scanner
    window.alternarScanner = () => {
        const r = document.getElementById('reader');
        if (r.style.display === 'none' || r.style.display === '') {
            r.style.display = 'block';
            if (!scanner) {
                scanner = new Html5Qrcode("reader");
                scanner.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: 250 },
                    (text) => {
                        let clean = text.replace(/^\]d2/, "").trim();
                        scanner.stop().then(() => {
                            r.style.display = 'none';
                            scanner = null;
                            abrirModal(clean);
                        }).catch(err => console.warn(err));
                    },
                    (error) => console.warn(error)
                );
            }
        } else {
            r.style.display = 'none';
            if (scanner) {
                scanner.stop().then(() => {
                    scanner = null;
                }).catch(err => console.warn(err));
            }
        }
    };

    document.getElementById('manualCode').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscarManual();
    });

    // Funções do teclado de data
    function gerarAnos() {
        const anosGrid = document.getElementById('anos-grid');
        if (!anosGrid) return;
        
        const anoAtual = new Date().getFullYear();
        const anos = [];
        
        for (let i = 0; i <= 30; i++) {
            anos.push(anoAtual + i);
        }
        
        anosGrid.innerHTML = anos.map(ano => `
            <button type="button" class="tecla-ano" data-ano="${ano}">${ano}</button>
        `).join('');
        
        document.querySelectorAll('.tecla-ano').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tecla-ano').forEach(b => b.classList.remove('selecionado'));
                btn.classList.add('selecionado');
                anoSelecionado = btn.dataset.ano;
                atualizarCampoData();
            });
        });
    }

    function atualizarCampoData() {
        const inputData = document.getElementById('inputData');
        if (inputData && mesSelecionado && anoSelecionado) {
            inputData.value = `${mesSelecionado}/${anoSelecionado}`;
        } else if (inputData && mesSelecionado) {
            inputData.value = `${mesSelecionado}/`;
        } else if (inputData && anoSelecionado) {
            inputData.value = `/${anoSelecionado}`;
        } else {
            inputData.value = '';
        }
    }

    function limparData() {
        mesSelecionado = '';
        anoSelecionado = '';
        
        document.querySelectorAll('.tecla-mes').forEach(btn => btn.classList.remove('selecionado'));
        document.querySelectorAll('.tecla-ano').forEach(btn => btn.classList.remove('selecionado'));
        
        const inputData = document.getElementById('inputData');
        if (inputData) inputData.value = '';
    }

    function gravarData() {
        const inputData = document.getElementById('inputData');
        if (inputData && inputData.value.length === 7 && /^\d{2}\/\d{4}$/.test(inputData.value)) {
            salvarData();
        } else {
            mostrarToast('Selecione um mês e um ano válidos', 'warning');
        }
    }

    // Função para marcar produtos sem vencimento
    window.marcarSemVencimento = async () => {
        const quantidade = parseInt(document.getElementById('inputQuantidade')?.value);
        
        if (!quantidade || quantidade <= 0) {
            mostrarToast('Digite uma quantidade válida', 'warning');
            return;
        }
        
        const itensPendentes = Object.entries(inventario)
            .filter(([_, item]) => item.codigo === refCodigoGlobal && !item.done);

        if (itensPendentes.length === 0) {
            mostrarToast('Todos os lotes já foram processados', 'info');
            fecharModal();
            return;
        }

        const totalPendente = itensPendentes.reduce((acc, [_, item]) => acc + (item.qtde || 0), 0);
        
        if (quantidade > totalPendente) {
            mostrarToast(`Quantidade indisponível. Total pendente: ${totalPendente}`, 'warning');
            return;
        }

        let updates = {};
        let quantidadeRestante = quantidade;

        for (let [id, item] of itensPendentes) {
            if (quantidadeRestante <= 0) break;
            
            const qtdDisponivel = item.qtde || 0;
            
            if (qtdDisponivel <= quantidadeRestante) {
                const novoId = `${id}_SEM_VAL_${Date.now()}`;
                
                const historico = item.historico || [];
                historico.push({
                    data: Date.now(),
                    tipo: 'validade_atribuida',
                    quantidade: qtdDisponivel,
                    validade: 'SEM VENCIMENTO'
                });
                
                updates[`${novoId}`] = {
                    ...item,
                    validade: 'SEM VENCIMENTO',
                    done: true,
                    qtde: qtdDisponivel,
                    historico: historico,
                    semVencimento: true
                };
                updates[`${id}`] = null;
                quantidadeRestante -= qtdDisponivel;
            } else {
                const novoId = `${id}_SEM_VAL_${Date.now()}`;
                
                const historico = item.historico || [];
                historico.push({
                    data: Date.now(),
                    tipo: 'validade_atribuida',
                    quantidade: quantidadeRestante,
                    validade: 'SEM VENCIMENTO'
                });
                
                updates[`${novoId}`] = {
                    ...item,
                    validade: 'SEM VENCIMENTO',
                    done: true,
                    qtde: quantidadeRestante,
                    historico: historico,
                    semVencimento: true
                };
                
                updates[`${id}`] = {

                    qtde: qtdDisponivel - quantidadeRestante
                };
                
                quantidadeRestante = 0;

                atualizarCampoData();

        // Botão GRAVAR
        const btnGravar = document.getElementById('btn-gravar-data');

            novoBtnGravar.addEventListener('click', gravarData);

        // Botão SEM VENCIMENTO
        const btnSemVencimento = document.getElementById('btn-sem-vencimento');

                e.target.value = val;
                
                if (val.length >= 5) {
                    const partes = val.split('/');
                    if (partes[0] && partes[0].length === 2 && partes[0] >= 1 && partes[0] <= 12) {
                        mesSelecionado = partes[0];
                        document.querySelectorAll('.tecla-mes').forEach(btn => {
                            if (btn.dataset.mes === mesSelecionado) {
                                btn.classList.add('selecionado');
                            } else {
                                btn.classList.remove('selecionado');
                            }
                        });
                    }
                    if (partes[1] && partes[1].length === 4) {
                        anoSelecionado = partes[1];
                        document.querySelectorAll('.tecla-ano').forEach(btn => {
                            if (btn.dataset.ano === anoSelecionado) {
                                btn.classList.add('selecionado');
                            } else {
                                btn.classList.remove('selecionado');
                            }
                        });
                    }
                }
            });
        }

    // Comparação
    window.compararImportacoes = () => {
        if (!estoqueAnterior || Object.keys(estoqueAnterior).length === 0) {
            estoqueAnterior = JSON.parse(JSON.stringify(inventario));
            mostrarToast('📸 Snapshot salvo! Importe outra planilha para comparar', 'info');
        } else {
            const diferencas = [];
            
            const atualMap = new Map();
            Object.values(inventario).forEach(p => {
                const codigo = p.codigo;
                if (!atualMap.has(codigo)) {
                    atualMap.set(codigo, {
                        codigo: codigo,
                        desc: p.desc,
                        quantidade: 0
                    });
                }
                atualMap.get(codigo).quantidade += p.qtde || 0;
            });
            
            const anteriorMap = new Map();
            Object.values(estoqueAnterior).forEach(p => {
                const codigo = p.codigo;
                if (!anteriorMap.has(codigo)) {
                    anteriorMap.set(codigo, {
                        codigo: codigo,
                        desc: p.desc,
                        quantidade: 0
                    });
                }
                anteriorMap.get(codigo).quantidade += p.qtde || 0;
            });
            
            const todosCodigos = new Set([...atualMap.keys(), ...anteriorMap.keys()]);
            
            todosCodigos.forEach(codigo => {
                const atual = atualMap.get(codigo)?.quantidade || 0;
                const anterior = anteriorMap.get(codigo)?.quantidade || 0;
                const desc = atualMap.get(codigo)?.desc || anteriorMap.get(codigo)?.desc || '';
                
                if (atual !== anterior) {
                    diferencas.push({
                        codigo,
                        desc,
                        anterior,
                        atual,
                        diferenca: atual - anterior,
                        percentual: anterior ? ((atual - anterior) / anterior * 100).toFixed(1) : '∞'
                    });
                }
            });
            
            diferencas.sort((a, b) => Math.abs(b.diferenca) - Math.abs(a.diferenca));
            
            const modal = document.getElementById('modalComparacao');
            const conteudo = document.getElementById('comparacaoConteudo');
            
            if (diferencas.length > 0) {
                const vendas = diferencas.filter(d => d.diferenca < 0).reduce((acc, d) => acc + Math.abs(d.diferenca), 0);
                const reposicoes = diferencas.filter(d => d.diferenca > 0).reduce((acc, d) => acc + d.diferenca, 0);
                
                conteudo.innerHTML = `
                    <div style="margin-bottom:20px; padding:15px; background:var(--bg-primary); border-radius:12px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:10px;">
                            <span>📉 Total vendas:</span>
                            <span style="color:var(--danger); font-weight:700;">${vendas} un</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;">
                            <span>📈 Total reposições:</span>
                            <span style="color:var(--success); font-weight:700;">${reposicoes} un</span>
                        </div>
                    </div>
                    
                    <div style="font-weight:600; margin-bottom:10px;">📊 Produtos com alteração (${diferencas.length}):</div>
                    ${diferencas.map(d => {
                        const classeDiferenca = d.diferenca > 0 ? 'diferenca-positiva' : 'diferenca-negativa';
                        const sinal = d.diferenca > 0 ? '▲' : '▼';
                        return `
                            <div class="comparacao-item">
                                <div style="flex:1;">
                                    <div><strong>${d.codigo}</strong> - ${d.desc.substring(0, 30)}${d.desc.length > 30 ? '...' : ''}</div>
                                    <div style="font-size:0.8rem; color:var(--text-secondary);">
                                        Anterior: ${d.anterior} | Atual: ${d.atual}
                                    </div>
                                </div>
                                <div class="comparacao-diferenca ${classeDiferenca}">
                                    ${sinal} ${Math.abs(d.diferenca)} (${d.percentual}%)
                                </div>

                        `;
                    }).join('')}
                `;
            } else {
                conteudo.innerHTML = '<div style="text-align:center; padding:30px;">Nenhuma diferença encontrada!</div>';

    // Cálculo de performance
    function getPerformanceIcon(dias, vendasPorMes = 0) {
        if (dias >= 90) return '🐌';
        if (dias >= 60) return '⏳';
        if (dias >= 30) return '🔄';
        if (vendasPorMes > 20) return '⚡';
        if (vendasPorMes > 10) return '📈';
        if (vendasPorMes > 5) return '📊';
        return '🆕';
    }

    // Previsão de estoque
    function calcularDiasEstoque(historico, quantidadeAtual) {
        if (!historico || historico.length === 0) return '∞';
        
        const ultimos30dias = historico
            .filter(h => h.tipo === 'venda' && (Date.now() - h.data) < 30 * 86400000)
            .reduce((acc, h) => acc + Math.abs(h.quantidade), 0);
        
        const mediaDiaria = ultimos30dias / 30;
        if (mediaDiaria === 0 || isNaN(mediaDiaria)) return '∞';
        return Math.floor(quantidadeAtual / mediaDiaria);
    }

    window.salvarData = async () => {
        const quantidade = parseInt(document.getElementById('inputQuantidade')?.value);
        const data = document.getElementById('inputData')?.value;
        
        if (!quantidade || quantidade <= 0) {
            mostrarToast('Digite uma quantidade válida', 'warning');
            return;
        }
        
        if (!data || data.length < 7) {
            mostrarToast('Selecione uma data válida no teclado', 'warning');
            return;
        }
        
        if (!/^\d{2}\/\d{4}$/.test(data)) {
            mostrarToast('Formato inválido. Use MM/AAAA', 'warning');
            return;
        }

        const dataSalvar = "01/" + data;
        
        const itensPendentes = Object.entries(inventario)
            .filter(([_, item]) => item.codigo === refCodigoGlobal && !item.done);

        if (itensPendentes.length === 0) {
            mostrarToast('Todos os lotes já têm validade', 'info');
            fecharModal();
            return;
        }

        const totalPendente = itensPendentes.reduce((acc, [_, item]) => acc + (item.qtde || 0), 0);
        
        if (quantidade > totalPendente) {
            mostrarToast(`Quantidade indisponível. Total pendente: ${totalPendente}`, 'warning');
            return;
        }

        let updates = {};
        let quantidadeRestante = quantidade;

        for (let [id, item] of itensPendentes) {
            if (quantidadeRestante <= 0) break;
            
            const qtdDisponivel = item.qtde || 0;
            
            if (qtdDisponivel <= quantidadeRestante) {
                const novoId = `${id}_VAL_${Date.now()}`;
                
                const historico = item.historico || [];
                historico.push({
                    data: Date.now(),
                    tipo: 'validade_atribuida',
                    quantidade: qtdDisponivel,
                    validade: dataSalvar
                });
                
                updates[`${novoId}`] = {
                    ...item,
                    validade: dataSalvar,
                    done: true,
                    qtde: qtdDisponivel,
                    historico: historico
                };
                updates[`${id}`] = null;
                quantidadeRestante -= qtdDisponivel;
            } else {
                const novoId = `${id}_VAL_${Date.now()}`;
                
                const historico = item.historico || [];
                historico.push({
                    data: Date.now(),
                    tipo: 'validade_atribuida',
                    quantidade: quantidadeRestante,
                    validade: dataSalvar
                });
                
                updates[`${novoId}`] = {
                    ...item,
                    validade: dataSalvar,
                    done: true,
                    qtde: quantidadeRestante,
                    historico: historico
                };
                
                updates[`${id}`] = {
                    ...item,
                    qtde: qtdDisponivel - quantidadeRestante
                };
                
                quantidadeRestante = 0;
            }
        }

        await estoqueRef.update(updates);
        mostrarToast(`${quantidade} unidades com validade ${data} adicionadas!`, 'success');
        fecharModal();
    };

    window.removerLotes = async (idsString) => {
        if (!confirm('Remover estes lotes?')) return;
        
        const ids = idsString.split(',');
        let updates = {};
        ids.forEach(id => {
            updates[id] = null;
        });
        
        await estoqueRef.update(updates);
        mostrarToast(`${ids.length} lote(s) removidos`, 'success');
        fecharModal();

    window.fecharModal = () => {

    window.exportarRelatorioParados = () => {
        const produtos = Object.values(inventario);
        
        const grupos = new Map();
        produtos.forEach(p => {
            if (!grupos.has(p.codigo)) {
                grupos.set(p.codigo, {
                    codigo: p.codigo,
                    desc: p.desc,
                    endereco: p.endereco || 'N/I',
                    quantidade: 0,
                    diasSemVenda: 0,
                    ultimaVenda: null,
                    estoqueMinimo: p.estoqueMinimo || 0
                });
            }
            const grupo = grupos.get(p.codigo);
            grupo.quantidade += p.qtde || 0;
            
            if (p.historico && p.historico.length > 0) {
                const vendas = p.historico.filter(h => h.tipo === 'venda');
                if (vendas.length > 0) {
                    const ultima = Math.max(...vendas.map(v => v.data));
                    grupo.ultimaVenda = ultima;
                    grupo.diasSemVenda = Math.floor((Date.now() - ultima) / 86400000);
                }
            }
        });
        
        const paradosArray = Array.from(grupos.values())
            .filter(g => g.diasSemVenda >= 30)
            .sort((a, b) => b.diasSemVenda - a.diasSemVenda);
        
        let csv = "Código;Descrição;Endereço;Quantidade;Dias sem venda;Última venda;Estoque Mínimo;Status\n";
        paradosArray.forEach(p => {
            const dataUlt = p.ultimaVenda ? new Date(p.ultimaVenda).toLocaleDateString('pt-BR') : 'Nunca';
            const status = p.diasSemVenda >= 90 ? 'Crítico' : (p.diasSemVenda >= 60 ? 'Alerta' : (p.diasSemVenda >= 30 ? 'Atenção' : 'Normal'));
            csv += `${p.codigo};${p.desc};${p.endereco};${p.quantidade};${p.diasSemVenda};${dataUlt};${p.estoqueMinimo};${status}\n`;
        });
        
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `produtos_parados_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        
        mostrarToast(`📊 Relatório com ${paradosArray.length} produtos gerado!`, 'success');
    };

    // Funções de estilo
    function getClasseSemMovimento(dias) {
        if (dias >= 120) return 'sem-movimento-120';
        if (dias >= 90) return 'sem-movimento-90';
        if (dias >= 60) return 'sem-movimento-60';
        if (dias >= 30) return 'sem-movimento-30';
        return '';
    }

    function getStatusText(dias) {
        if (dias >= 120) return '🔥 120+ DIAS';
        if (dias >= 90) return '🔴 90+ DIAS';
        if (dias >= 60) return '🟠 60+ DIAS';
        if (dias >= 30) return '🟡 30+ DIAS';
        return '✅ Normal';
    }

    function getStatusClass(dias) {
        if (dias >= 120) return 'status-parado-120';
        if (dias >= 90) return 'status-parado-90';
        if (dias >= 60) return 'status-parado-60';
        if (dias >= 30) return 'status-parado-30';

    function renderizarLista() {
        const container = document.getElementById('lista-estoque');
        const ordenarPor = document.getElementById('ordenarPor').value;
        
        let itensFiltrados = Object.values(inventario);
        
        if (abaAtual === 'xml') {
            itensFiltrados = itensFiltrados.filter(item => item.origem === 'xml');
        } else {
            itensFiltrados = itensFiltrados.filter(item => item.origem === 'estoque');
        }
        
        const produtosAgrupados = new Map();
        itensFiltrados.forEach(item => {
            if (!produtosAgrupados.has(item.codigo)) {
                produtosAgrupados.set(item.codigo, {
                    ...item,
                    lotes: [item]
                });
            } else {
                const existente = produtosAgrupados.get(item.codigo);
                existente.lotes.push(item);
                existente.qtde = (existente.qtde || 0) + (item.qtde || 0);
            }
        });
        
        let produtos = Array.from(produtosAgrupados.values());
        
        produtos.forEach(prod => {
            const todasVendas = prod.lotes.flatMap(l => l.historico || [])
                .filter(h => h.tipo === 'venda')
                .sort((a, b) => b.data - a.data);
            
            const ultimaVenda = todasVendas.length > 0 ? todasVendas[0].data : null;
            prod.diasSemVenda = ultimaVenda ? Math.floor((Date.now() - ultimaVenda) / 86400000) : 
                                (prod.historico && prod.historico.length > 0 ? Math.floor((Date.now() - prod.historico[0]?.data) / 86400000) : 0);
            
            const historicoCompleto = prod.lotes.flatMap(l => l.historico || []);
            prod.vendasMes = historicoCompleto
                .filter(h => h.tipo === 'venda' && (Date.now() - h.data) < 30 * 86400000)
                .reduce((acc, h) => acc + Math.abs(h.quantidade), 0);
        });
        
        if (filtroAtual !== 'todos') {
            produtos = produtos.filter(prod => {
                switch(filtroAtual) {
                    case 'pendente': return !prod.done;
                    case 'concluido': return prod.done;
                    case 'parado30': return prod.diasSemVenda >= 30;
                    case 'parado60': return prod.diasSemVenda >= 60;
                    case 'parado90': return prod.diasSemVenda >= 90;
                    default: return true;
                }
            });
        }
        
        produtos.sort((a, b) => {
            switch(ordenarPor) {
                case 'dias': return (b.diasSemVenda || 0) - (a.diasSemVenda || 0);
                case 'dias-menor': return (a.diasSemVenda || 0) - (b.diasSemVenda || 0);
                case 'quantidade': return (b.qtde || 0) - (a.qtde || 0);
                case 'quantidade-menor': return (a.qtde || 0) - (b.qtde || 0);
                case 'codigo': return (a.codigo || '').localeCompare(b.codigo || '');
                case 'nome': return (a.desc || '').localeCompare(b.desc || '');
                default: return (b.diasSemVenda || 0) - (a.diasSemVenda || 0);
            }
        });
        
        document.getElementById('result-count').innerText = `${produtos.length} itens`;
        
        if (produtos.length === 0) {
            container.innerHTML = `
                <div style="text-align: center; padding: 40px; background: var(--bg-secondary); border-radius: 16px; color: var(--text-secondary);">
                    <i class="fas fa-box-open" style="font-size: 3rem; margin-bottom: 10px;"></i>
                    <p>Nenhum produto encontrado</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = produtos.map(prod => {
            const classeMovimento = getClasseSemMovimento(prod.diasSemVenda);
            const statusText = getStatusText(prod.diasSemVenda);
            const statusClass = getStatusClass(prod.diasSemVenda);
            const performanceIcon = getPerformanceIcon(prod.diasSemVenda, prod.vendasMes);
            
            const historicoCompleto = prod.lotes.flatMap(l => l.historico || []);
            const diasEstoque = calcularDiasEstoque(historicoCompleto, prod.qtde || 0);
            
            return `
            <div class="produto-item ${prod.done ? 'concluido' : 'pendente'} ${classeMovimento}" onclick="abrirModal('${prod.codigo}')">
                <div class="produto-header">
                    <span class="produto-codigo">
                        <span class="performance-icon">${performanceIcon}</span>
                        ${prod.codigo}
                    </span>
                    <span class="produto-status ${prod.done ? 'status-concluido' : (prod.diasSemVenda >= 30 ? statusClass : 'status-pendente')}">
                        ${prod.done ? '✅ Concluído' : statusText}
                    </span>
                </div>
                <div class="produto-desc">${(prod.desc || '').substring(0, 50)}${prod.desc?.length > 50 ? '...' : ''}</div>
                <div class="produto-detalhes">
                    <span><i class="fas fa-file"></i> ${prod.origem === 'xml' ? `NF ${prod.nf}` : 'Estoque'}</span>
                    <span><i class="fas fa-box"></i> ${prod.qtde} un</span>
                    ${diasEstoque !== '∞' ? `<span><i class="fas fa-clock"></i> ${diasEstoque}d</span>` : ''}
                </div>
                ${prod.endereco ? `
                <div class="produto-endereco">
                    <i class="fas fa-map-marker-alt"></i> ${prod.endereco}
                </div>
                ` : ''}
                <div class="produto-movimento">
                    ${prod.diasSemVenda >= 30 ? `
                        <span class="badge-dias ${prod.diasSemVenda >= 90 ? 'badge-90' : (prod.diasSemVenda >= 60 ? 'badge-60' : 'badge-30')}">
                            <i class="fas fa-hourglass-half"></i> ${prod.diasSemVenda} dias
                        </span>
                    ` : ''}
                    ${prod.alertaEstoque ? `
                        <span class="badge-dias badge-90">
                            <i class="fas fa-exclamation-triangle"></i> Estoque mínimo
                        </span>
                    ` : ''}
                </div>
            </div>
        `}).join('');
    }

    function atualizarStatus() {
        const lotes = Object.values(inventario);
        
        const produtosParados = new Set();
        const produtosParados90 = new Set();
        
        lotes.forEach(item => {
            if (item.historico && item.historico.length > 0) {
                const vendas = item.historico.filter(h => h.tipo === 'venda');
                const ultimaVenda = vendas.length > 0 ? Math.max(...vendas.map(v => v.data)) : null;
                const diasSemVenda = ultimaVenda ? Math.floor((Date.now() - ultimaVenda) / 86400000) : 
                                     Math.floor((Date.now() - (item.historico[0]?.data || Date.now())) / 86400000);
                
                if (diasSemVenda >= 30) {
                    produtosParados.add(item.codigo);
                }
                if (diasSemVenda >= 90) {
                    produtosParados90.add(item.codigo);
                }
            }
        });
        
        document.getElementById('stat-lotes').innerText = lotes.length;
        document.getElementById('stat-pendentes').innerText = lotes.filter(l => !l.done).length;
        document.getElementById('stat-parados').innerText = produtosParados.size;
        document.getElementById('stat-parados-90').innerText = produtosParados90.size;
    }

    document.getElementById('manualCode').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscarManual();
    });

    console.log('Sistema de gestão de estoque iniciado!');
</script>

        gap: 10px;
        flex-wrap: wrap;

        font-weight: 700;
    }
    .diferenca-positiva { color: var(--success); }
    .diferenca-negativa { color: var(--danger); }
