<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>OPERA X LOGÍSTICA | MONITOR DE PERFORMANCE</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui; background: #0a0c15; color: #fff; padding: 16px; min-height: 100vh; }
        .dashboard { max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .card { background: rgba(18, 22, 35, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        .card-header { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); font-weight: 800; font-size: 12px; text-transform: uppercase; color: #8b9dc3; }
        .grid-metrics { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
        .grid-charts { display: grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 12px; }
        .grid-performance { display: grid; grid-template-columns: 1.8fr 1fr; gap: 12px; }
        .grid-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 1000px) { .grid-metrics { grid-template-columns: repeat(3,1fr); } .grid-charts { grid-template-columns: 1fr; } .grid-performance { grid-template-columns: 1fr; } }
        @media (max-width: 640px) { .grid-metrics { grid-template-columns: repeat(2,1fr); } .grid-compare { grid-template-columns: 1fr; } }
        .metric-card { padding: 14px; background: rgba(0,0,0,0.3); border-radius: 16px; border-left: 4px solid; transition: transform 0.2s; }
        .metric-card:hover { transform: translateY(-2px); }
        .metric-label { font-size: 10px; color: #8b9dc3; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .metric-value { font-size: 24px; font-weight: 900; margin-top: 4px; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 24px; padding: 16px; min-height: 200px; }
        .podium-item { text-align: center; }
        .avatar-xl { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ffd700; overflow: hidden; margin: 0 auto 8px; }
        .avatar-lg { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #c0c0c0; overflow: hidden; margin: 0 auto 8px; }
        .avatar-md { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #cd7f32; overflow: hidden; margin: 0 auto 8px; }
        .avatar-xl img, .avatar-lg img, .avatar-md img, .avatar-small img { width: 100%; height: 100%; object-fit: cover; }
        .ranking-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .ranking-table th { text-align: left; padding: 10px 8px; background: rgba(0,0,0,0.3); color: #8b9dc3; font-size: 10px; text-transform: uppercase; position: sticky; top: 0; }
        .ranking-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ranking-table tr:hover { background: rgba(59,130,246,0.1); }
        .rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.1), transparent); border-left: 3px solid #ffd700; }
        .rank-2 { background: linear-gradient(90deg, rgba(192,192,192,0.08), transparent); border-left: 3px solid #c0c0c0; }
        .rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.08), transparent); border-left: 3px solid #cd7f32; }
        .compare-card { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 16px; }
        .compare-title { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px; }
        .compare-stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
        .compare-stat-value { font-size: 22px; font-weight: 900; }
        .compare-stat-label { font-size: 9px; color: #8b9dc3; text-transform: uppercase; }
        .stock-card { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 14px; text-align: center; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.5s; }
        .btn-upload { background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.3); padding: 6px 12px; border-radius: 10px; font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-upload:hover { background: rgba(16,185,129,0.4); }
        .avatar-small { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; display: inline-block; vertical-align: middle; }
        .scroll-area { overflow-y: auto; max-height: 350px; }
        .timeline-bar { position: fixed; top: 0; left: 0; height: 3px; background: #3b82f6; width: 0%; transition: width 0.1s linear; z-index: 9999; }
        .toast { position: fixed; bottom: 20px; right: 20px; z-index: 10000; background: #1e293b; border: 1px solid #3b82f6; border-radius: 12px; padding: 12px 20px; }
        .loading { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; border-radius: 20px; z-index: 10; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59,130,246,0.3); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .select-unidade { background: #1e293b; border: 1px solid #3b82f6; border-radius: 12px; padding: 8px 16px; color: white; font-weight: 600; min-width: 220px; cursor: pointer; }
        .filter-btn { padding: 6px 16px; border-radius: 10px; font-weight: 700; font-size: 11px; background: rgba(255,255,255,0.05); color: #8b9dc3; border: none; cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background: #3b82f6; color: white; }
        .filter-btn:hover { background: rgba(59,130,246,0.4); color: white; }
        .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; padding: 16px; }
        .filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .stat-number { font-size: 28px; font-weight: 900; }
        .stat-label { font-size: 10px; color: #8b9dc3; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-group { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 8px; }
        .stat-group > div { flex: 1; text-align: center; }
        .text-emerald { color: #10b981; }
        .text-rose { color: #ef4444; }
        .text-blue { color: #3b82f6; }
        .text-yellow { color: #f59e0b; }
    </style>
</head>
<body>

<div class="timeline-bar" id="timelineBar"></div>
<div id="toast" class="toast hidden"><i class="fas fa-circle-info mr-2 text-blue-500"></i><span id="toastMsg"></span></div>

<div class="dashboard">
    <div class="card">
        <div class="header-content">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600/20 p-2 rounded-xl"><i class="fas fa-chart-line text-blue-500 text-xl"></i></div>
                <div><h1 class="text-xl font-bold">OPERA X <span class="text-blue-500">LOGÍSTICA</span></h1><p class="text-[10px] text-slate-400">MONITOR DE PERFORMANCE</p></div>
            </div>
            <div class="filters">
                <select id="unidadeSelect" class="select-unidade">
                    <option value="COMPARE">📊 COMPARATIVO (VITÓRIA x PINHEIRO)</option>
                    <option value="VITORIA">🏪 VD VITÓRIA</option>
                    <option value="PINHEIRO">🏪 VD PINHEIRO</option>
                </select>
                <div class="flex gap-1">
                    <button onclick="setFilter('hoje')" id="btnHoje" class="filter-btn">HOJE</button>
                    <button onclick="setFilter('semana')" id="btnSemana" class="filter-btn">SEMANA</button>
                    <button onclick="setFilter('mes')" id="btnMes" class="filter-btn active">MÊS</button>
                </div>
            </div>
        </div>
    </div>

    <div id="individualMetrics" class="grid-metrics"></div>
    <div id="compareMetrics" class="grid-compare" style="display: none;"></div>

    <div class="grid-charts">
        <div class="card"><div class="card-header"><i class="fas fa-chart-pie mr-2"></i> PARTICIPAÇÃO</div><div class="p-4 flex justify-center"><canvas id="chartPizza" style="max-height: 160px;"></canvas></div></div>
        <div class="card"><div class="card-header"><i class="fas fa-trophy mr-2"></i> PÓDIO</div><div id="podiumContainer" class="podium"></div></div>
        <div class="card"><div class="card-header"><i class="fas fa-gauge-high mr-2"></i> EFICIÊNCIA (min/ped)</div><div class="p-4"><canvas id="chartTempo" style="max-height: 160px;"></canvas></div></div>
    </div>

    <div class="grid-performance">
        <div class="card" style="position: relative;">
            <div class="card-header"><i class="fas fa-medal mr-2"></i> RANKING</div>
            <div class="scroll-area"><table class="ranking-table"><thead><tr><th>#</th><th>COLABORADOR</th><th class="text-center">PED</th><th class="text-center">ITENS</th><th class="text-center">MÉDIA</th><th class="text-center">MIN/PED</th><th class="text-center">PROD</th><th class="text-center">STATUS</th></tr></thead><tbody id="rankingBody"></tbody></table></div>
            <div id="loadingRanking" class="loading" style="display: none;"><div class="spinner"></div></div>
        </div>
        <div id="stockCard" class="card"></div>
    </div>

    <footer class="text-center text-[9px] text-slate-500 py-2">© 2025 OPERA X LOGÍSTICA | DESENVOLVIDO POR BENILSON AMORIM</footer>
</div>

<div id="modalEndereco" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-black/80 p-4" onclick="if(event.target===this) closeModal()">
    <div class="card w-full max-w-3xl max-h-[80vh] overflow-hidden">
        <div class="card-header flex justify-between"><span><i class="fas fa-map-marker-alt text-rose-500 mr-2"></i> PRODUTOS SEM LOCALIZAÇÃO</span><button onclick="closeModal()" class="text-slate-400 hover:text-white">✕</button></div>
        <div class="p-4 overflow-auto max-h-[60vh]"><table class="ranking-table w-full"><thead><tr><th>CÓDIGO</th><th>DESCRIÇÃO</th><th class="text-right">QTD</th></tr></thead><tbody id="modalTableBody"></tbody></table></div>
        <div class="p-3 border-t border-white/10"><button onclick="closeModal()" class="w-full py-2 bg-slate-700 rounded-lg text-sm font-bold">FECHAR</button></div>
    </div>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls" class="hidden">

<script>
    // ============================================================
    // CONFIGURAÇÃO
    // ============================================================
    
    const SHEET_VITORIA = "1NDBWaQrauw3V-dg6Qk9ZQ6ysCpYEedtz2HtYTydOBhw";
    const SHEET_PINHEIRO = "1yVyIxhLpjUv0RmEgAgo7GrE0ax0azFG28nFW7pKupLw";
    
    const ABA_VITORIA = "SEPARAÇÃO MAIO/26";
    const ABA_PINHEIRO = "SEPARAÇÃO ABR/26";
    
    const FIREBASE_CONFIG = {
        apiKey: "AIzaSyDlp5p7c3xpc42cRa1un_-zd3HNwqnGuQU",
        authDomain: "petisco-a5880.firebaseapp.com",
        databaseURL: "https://petisco-a5880-default-rtdb.firebaseio.com",
        projectId: "petisco-a5880",
        storageBucket: "petisco-a5880.firebasestorage.app",
        messagingSenderId: "211799950005",
        appId: "1:211799950005:web:836bb02c084bc906bdf4fc"
    };
    firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.database();

    let dadosVitoria = [], dadosPinheiro = [];
    let estoqueVitoria = [], estoquePinheiro = [];
    let fotos = {};
    let filtroAtual = 'mes';
    let modoAtual = 'COMPARE';
    let tempoProgresso = 0;
    let chartPizza = null, chartTempo = null;

    function notificar(msg, erro = false) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerHTML = msg;
        toast.classList.remove('hidden');
        toast.style.borderColor = erro ? '#ef4444' : '#3b82f6';
        setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function mostrarLoading(show) {
        const div = document.getElementById('loadingRanking');
        if(div) div.style.display = show ? 'flex' : 'none';
    }

    // FUNÇÃO CORRIGIDA PARA PARSE DE HORA - SUPORTA MÚLTIPLOS FORMATOS
    function parseHoraCompleta(valor) {
        if (!valor || valor === 'null' || valor === '') return null;
        
        // Se for número (minutos desde meia-noite)
        if (typeof valor === 'number') {
            if (valor > 0 && valor < 1440) return valor;
            return null;
        }
        
        const str = String(valor).trim();
        
        // Formato: "08:30" ou "8:30"
        const matchSimples = str.match(/^(\d{1,2}):(\d{2})$/);
        if (matchSimples) {
            return parseInt(matchSimples[1]) * 60 + parseInt(matchSimples[2]);
        }
        
        // Formato: "08:30:00"
        const matchCompleto = str.match(/^(\d{1,2}):(\d{2}):(\d{2})$/);
        if (matchCompleto) {
            return parseInt(matchCompleto[1]) * 60 + parseInt(matchCompleto[2]);
        }
        
        // Formato: "8:30 AM" ou "08:30 AM"
        const matchAmPm = str.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
        if (matchAmPm) {
            let hora = parseInt(matchAmPm[1]);
            const minuto = parseInt(matchAmPm[2]);
            const ampm = matchAmPm[3].toUpperCase();
            if (ampm === 'PM' && hora !== 12) hora += 12;
            if (ampm === 'AM' && hora === 12) hora = 0;
            return hora * 60 + minuto;
        }
        
        // Tentar converter data completa
        const dataTeste = new Date(str);
        if (!isNaN(dataTeste.getTime()) && dataTeste.getHours() > 0) {
            return dataTeste.getHours() * 60 + dataTeste.getMinutes();
        }
        
        return null;
    }

    function carregarPlanilha(sheetId, abaNome, callbackNome, resolve) {
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:${callbackNome}&sheet=${encodeURIComponent(abaNome)}`;
        
        window[callbackNome] = function(resposta) {
            delete window[callbackNome];
            if (!resposta || !resposta.table || !resposta.table.rows) {
                resolve([]);
                return;
            }
            
            const dados = [];
            console.log(`Processando ${abaNome}...`);
            
            for (const row of resposta.table.rows) {
                if (!row.c || row.c.length < 4) continue;
                
                const nome = row.c[2]?.v;
                if (!nome || String(nome).toUpperCase().includes('TOTAL')) continue;
                
                // Data
                let data = null;
                const dataRaw = row.c[0]?.v || row.c[0]?.f;
                if (dataRaw && dataRaw.toString().includes('Date')) {
                    const m = dataRaw.toString().match(/Date\((\d+),(\d+),(\d+)\)/);
                    if (m) data = new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3]));
                } else if (row.c[0]?.f) {
                    const parts = row.c[0].f.split('/');
                    if (parts.length === 3) data = new Date(parts[2], parts[1]-1, parts[0]);
                } else if (typeof dataRaw === 'string') {
                    const parts = dataRaw.split('/');
                    if (parts.length === 3) data = new Date(parts[2], parts[1]-1, parts[0]);
                }
                
                const qtd = parseInt(row.c[3]?.v) || 0;
                const itens = parseInt(row.c[4]?.v) || 0;
                
                // Horários - CORRIGIDO
                const inicioRaw = row.c[5]?.v || row.c[5]?.f || '';
                const fimRaw = row.c[6]?.v || row.c[6]?.f || '';
                
                const inicio = parseHoraCompleta(inicioRaw);
                const fim = parseHoraCompleta(fimRaw);
                
                let tempo = 0;
                if (inicio !== null && fim !== null && inicio > 0 && fim > 0) {
                    tempo = fim - inicio;
                    if (tempo < 0) tempo += 1440;
                    if (tempo > 480) tempo = 0;
                }
                
                if (data && qtd > 0) {
                    dados.push({
                        data: data,
                        nome: String(nome).trim().toUpperCase(),
                        qtd: qtd,
                        itens: itens,
                        tempo: tempo
                    });
                }
            }
            
            console.log(`📊 ${abaNome}: ${dados.length} registros processados`);
            resolve(dados);
        };
        
        const script = document.createElement('script');
        script.src = url;
        document.body.appendChild(script);
        
        setTimeout(() => {
            if (window[callbackNome]) {
                delete window[callbackNome];
                resolve([]);
            }
        }, 15000);
    }

    async function carregarTudo() {
        mostrarLoading(true);
        notificar("Carregando dados...");
        
        const vitoriaPromise = new Promise((resolve) => {
            carregarPlanilha(SHEET_VITORIA, ABA_VITORIA, "callback_vitoria_" + Date.now(), resolve);
        });
        
        const pinheiroPromise = new Promise((resolve) => {
            carregarPlanilha(SHEET_PINHEIRO, ABA_PINHEIRO, "callback_pinheiro_" + Date.now(), resolve);
        });
        
        const [vitoria, pinheiro] = await Promise.all([vitoriaPromise, pinheiroPromise]);
        
        dadosVitoria = vitoria;
        dadosPinheiro = pinheiro;
        
        console.log(`✅ VITÓRIA: ${dadosVitoria.length} registros`);
        console.log(`✅ PINHEIRO: ${dadosPinheiro.length} registros`);
        
        if (dadosVitoria.length === 0) {
            notificar(`❌ VD VITÓRIA: Nenhum dado na aba "${ABA_VITORIA}"`, true);
        } else {
            notificar(`✅ VD VITÓRIA: ${dadosVitoria.length} pedidos`);
        }
        
        if (dadosPinheiro.length === 0) {
            notificar(`❌ VD PINHEIRO: Nenhum dado na aba "${ABA_PINHEIRO}"`, true);
        } else {
            notificar(`✅ VD PINHEIRO: ${dadosPinheiro.length} pedidos`);
        }
        
        db.ref('estoque_vitoria').on('value', snap => { estoqueVitoria = snap.val() || []; atualizarUI(); });
        db.ref('estoque_pinheiro').on('value', snap => { estoquePinheiro = snap.val() || []; atualizarUI(); });
        db.ref('fotos_separadores').on('value', snap => { fotos = snap.val() || {}; atualizarUI(); });
        
        mostrarLoading(false);
        atualizarUI();
    }

    function filtrarPeriodo(dados) {
        const hoje = new Date(); 
        hoje.setHours(0,0,0,0);
        return dados.filter(item => {
            if(!item.data) return false;
            const diff = (hoje - item.data) / 86400000;
            if(filtroAtual === 'hoje') return item.data.toDateString() === hoje.toDateString();
            if(filtroAtual === 'semana') return diff >= 0 && diff <= 7;
            return item.data.getMonth() === hoje.getMonth() && item.data.getFullYear() === hoje.getFullYear();
        });
    }

    function processarDados(dados) {
        const grupo = {};
        let totalTempo = 0, totalPedidos = 0, totalItens = 0;
        
        dados.forEach(d => {
            if(!grupo[d.nome]) grupo[d.nome] = { qtd:0, tempo:0, itens:0 };
            grupo[d.nome].qtd += d.qtd;
            grupo[d.nome].tempo += d.tempo;
            grupo[d.nome].itens += d.itens;
            totalTempo += d.tempo;
            totalPedidos += d.qtd;
            totalItens += d.itens;
        });
        
        const ranking = Object.entries(grupo).map(([nome, v]) => ({
            nome, 
            qtd: v.qtd, 
            itens: v.itens, 
            tempoTotal: v.tempo,
            tempoMedio: v.qtd > 0 && v.tempo > 0 ? (v.tempo / v.qtd).toFixed(1) : 0,
            mediaItens: v.qtd > 0 ? (v.itens / v.qtd).toFixed(1) : 0,
            produtividade: (v.qtd > 0 && v.tempo > 0) ? (v.itens / (v.tempo / 60)).toFixed(1) : 0
        })).sort((a,b) => b.qtd - a.qtd);
        
        const mediaEquipe = ranking.length ? Math.round(totalPedidos / ranking.length) : 0;
        const tempoMedioGeral = totalPedidos > 0 ? (totalTempo / totalPedidos).toFixed(1) : 0;
        
        return { ranking, totalPedidos, totalItens, totalTempo, mediaEquipe, tempoMedioGeral };
    }

    function atualizarUI() {
        if(modoAtual === 'COMPARE') {
            renderizarComparativo();
        } else {
            const dados = modoAtual === 'VITORIA' ? dadosVitoria : dadosPinheiro;
            const nome = modoAtual === 'VITORIA' ? 'VD VITÓRIA' : 'VD PINHEIRO';
            renderizarIndividual(dados, nome);
        }
        renderizarPodiumGlobal();
        renderizarStock();
    }

    function renderizarComparativo() {
        document.getElementById('individualMetrics').style.display = 'none';
        document.getElementById('compareMetrics').style.display = 'grid';
        
        const filtV = filtrarPeriodo(dadosVitoria);
        const filtP = filtrarPeriodo(dadosPinheiro);
        const procV = processarDados(filtV);
        const procP = processarDados(filtP);
        
        document.getElementById('compareMetrics').innerHTML = `
            <div class="compare-card">
                <div class="compare-title"><i class="fas fa-store text-blue-500"></i> VD VITÓRIA</div>
                <div class="compare-stats">
                    <div class="compare-stat"><div class="compare-stat-value text-blue-500">${procV.totalPedidos}</div><div class="compare-stat-label">PEDIDOS</div></div>
                    <div class="compare-stat"><div class="compare-stat-value text-orange-500">${procV.totalItens}</div><div class="compare-stat-label">ITENS</div></div>
                    <div class="compare-stat"><div class="compare-stat-value text-emerald-500">${procV.mediaEquipe}</div><div class="compare-stat-label">MÉDIA EQUIPE</div></div>
                    <div class="compare-stat"><div class="compare-stat-value text-purple-500">${procV.tempoMedioGeral}m</div><div class="compare-stat-label">MIN/PEDIDO</div></div>
                </div>
            </div>
            <div class="compare-card">
                <div class="compare-title"><i class="fas fa-store text-yellow-500"></i> VD PINHEIRO</div>
                <div class="compare-stats">
                    <div class="compare-stat"><div class="compare-stat-value text-yellow-500">${procP.totalPedidos}</div><div class="compare-stat-label">PEDIDOS</div></div>
                    <div class="compare-stat"><div class="compare-stat-value text-orange-500">${procP.totalItens}</div><div class="compare-stat-label">ITENS</div></div>
                    <div class="compare-stat"><div class="compare-stat-value text-emerald-500">${procP.mediaEquipe}</div><div class="compare-stat-label">MÉDIA EQUIPE</div></div>
                    <div class="compare-stat"><div class="compare-stat-value text-purple-500">${procP.tempoMedioGeral}m</div><div class="compare-stat-label">MIN/PEDIDO</div></div>
                </div>
            </div>
        `;
        
        const topV = procV.ranking.slice(0,5);
        const topP = procP.ranking.slice(0,5);
        const labels = [...new Set([...topV.map(r=>r.nome.split(' ')[0]), ...topP.map(r=>r.nome.split(' ')[0])])].slice(0,6);
        
        if(chartPizza) chartPizza.destroy();
        chartPizza = new Chart(document.getElementById('chartPizza'), {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    { label: 'VD VITÓRIA', data: labels.map(l => topV.find(r=>r.nome.split(' ')[0]===l)?.qtd || 0), backgroundColor: '#3b82f6', borderRadius: 6 },
                    { label: 'VD PINHEIRO', data: labels.map(l => topP.find(r=>r.nome.split(' ')[0]===l)?.qtd || 0), backgroundColor: '#f59e0b', borderRadius: 6 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top', labels: { color: '#8b9dc3', font: { size: 10 } } } } }
        });
        
        if(chartTempo) chartTempo.destroy();
        chartTempo = new Chart(document.getElementById('chartTempo'), {
            type: 'bar',
            data: {
                labels,
                datasets: [
                    { label: 'VD VITÓRIA', data: labels.map(l => topV.find(r=>r.nome.split(' ')[0]===l)?.tempoMedio || 0), backgroundColor: '#3b82f6', borderRadius: 6 },
                    { label: 'VD PINHEIRO', data: labels.map(l => topP.find(r=>r.nome.split(' ')[0]===l)?.tempoMedio || 0), backgroundColor: '#f59e0b', borderRadius: 6 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top', labels: { color: '#8b9dc3', font: { size: 10 } } } } }
        });
        
        const todosNomes = [...new Set([...procV.ranking.map(r=>r.nome), ...procP.ranking.map(r=>r.nome)])];
        const combinado = todosNomes.map(nome => ({
            nome,
            vitoria: procV.ranking.find(r=>r.nome===nome)?.qtd || 0,
            pinheiro: procP.ranking.find(r=>r.nome===nome)?.qtd || 0,
            total: (procV.ranking.find(r=>r.nome===nome)?.qtd || 0) + (procP.ranking.find(r=>r.nome===nome)?.qtd || 0)
        })).sort((a,b) => b.total - a.total).slice(0,15);
        
        const tbody = document.getElementById('rankingBody');
        tbody.innerHTML = combinado.map((r,i) => {
            const foto = fotos[r.nome.replace(/\s/g,'_')] || `https://ui-avatars.com/api/?name=${encodeURIComponent(r.nome)}&background=1e293b&color=fff&size=32&bold=true`;
            let rowClass = i===0 ? 'rank-1' : (i===1 ? 'rank-2' : (i===2 ? 'rank-3' : ''));
            return `<tr class="${rowClass}">
                <td class="font-black text-slate-400">#${i+1}</td>
                <td class="flex items-center gap-2"><div class="avatar-small"><img src="${foto}"></div><span class="font-bold text-xs">${r.nome.length > 18 ? r.nome.substring(0,18)+'...' : r.nome}</span></td>
                <td class="text-center"><span class="text-blue-500">${r.vitoria}</span> | <span class="text-yellow-500">${r.pinheiro}</span></td>
                <td class="text-center font-bold text-emerald-500">${r.total}</td>
                <td class="text-center">-</td><td class="text-center">-</td><td class="text-center">-</td>
                <td class="text-center"><span class="px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-500 text-[9px] font-bold">COMPARE</span></td>
            </tr>`;
        }).join('');
    }

    function renderizarIndividual(dados, nomeUnidade) {
        document.getElementById('individualMetrics').style.display = 'grid';
        document.getElementById('compareMetrics').style.display = 'none';
        
        const filtrados = filtrarPeriodo(dados);
        const { ranking, totalPedidos, totalItens, totalTempo, mediaEquipe, tempoMedioGeral } = processarDados(filtrados);
        const melhor = ranking[0]?.nome || '-';
        const pior = ranking[ranking.length-1]?.nome || '-';
        
        document.getElementById('individualMetrics').innerHTML = `
            <div class="metric-card border-l-blue-500"><div class="metric-label">TOTAL PEDIDOS</div><div class="metric-value">${totalPedidos}</div></div>
            <div class="metric-card border-l-orange-500"><div class="metric-label">TOTAL ITENS</div><div class="metric-value">${totalItens}</div></div>
            <div class="metric-card border-l-emerald-500"><div class="metric-label">MÉDIA EQUIPE</div><div class="metric-value">${mediaEquipe}</div></div>
            <div class="metric-card border-l-purple-500"><div class="metric-label">MIN/PEDIDO</div><div class="metric-value">${tempoMedioGeral}m</div></div>
            <div class="metric-card border-l-yellow-500"><div class="metric-label">MELHOR</div><div class="metric-value text-sm truncate">${melhor}</div></div>
            <div class="metric-card border-l-rose-500"><div class="metric-label">PIOR</div><div class="metric-value text-sm truncate">${pior}</div></div>
        `;
        
        const labels = ranking.slice(0,5).map(r=>r.nome.split(' ')[0]);
        const valores = ranking.slice(0,5).map(r=>r.qtd);
        const tempos = ranking.slice(0,5).map(r=>parseFloat(r.tempoMedio));
        
        if(chartPizza) chartPizza.destroy();
        chartPizza = new Chart(document.getElementById('chartPizza'), {
            type: 'doughnut',
            data: { labels, datasets: [{ data: valores, backgroundColor: ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { color: '#8b9dc3', font: { size: 9 } } } } }
        });
        
        if(chartTempo) chartTempo.destroy();
        chartTempo = new Chart(document.getElementById('chartTempo'), {
            type: 'bar',
            data: { labels, datasets: [{ data: tempos, backgroundColor: '#a855f7', borderRadius: 6 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, title: { display: true, text: 'minutos/pedido', color: '#8b9dc3', font: { size: 9 } } } } }
        });
        
        const tbody = document.getElementById('rankingBody');
        tbody.innerHTML = ranking.slice(0,15).map((r,i) => {
            const foto = fotos[r.nome.replace(/\s/g,'_')] || `https://ui-avatars.com/api/?name=${encodeURIComponent(r.nome)}&background=1e293b&color=fff&size=32&bold=true`;
            let rowClass = i===0 ? 'rank-1' : (i===1 ? 'rank-2' : (i===2 ? 'rank-3' : ''));
            return `<tr class="${rowClass}">
                <td class="font-black text-slate-400">#${i+1}</td>
                <td class="flex items-center gap-2 cursor-pointer" onclick="uploadFoto('${r.nome}')"><div class="avatar-small"><img src="${foto}"></div><span class="font-bold text-xs">${r.nome.length > 18 ? r.nome.substring(0,18)+'...' : r.nome}</span></td>
                <td class="text-center font-black text-blue-500">${r.qtd}</td>
                <td class="text-center text-orange-500">${r.itens}</td>
                <td class="text-center text-purple-500">${r.mediaItens}</td>
                <td class="text-center font-black ${r.tempoMedio > 0 ? 'text-emerald-500' : 'text-slate-500'}">${r.tempoMedio > 0 ? r.tempoMedio+'m' : '-'}</td>
                <td class="text-center font-black text-amber-500">${r.produtividade}</td>
                <td class="text-center"><span class="px-2 py-0.5 rounded-full text-[9px] font-bold ${r.qtd >= mediaEquipe ? 'bg-emerald-500/20 text-emerald-500' : 'bg-rose-500/20 text-rose-500'}">${r.qtd >= mediaEquipe ? 'META' : '↓'}</span></td>
            </tr>`;
        }).join('');
    }

    function renderizarPodiumGlobal() {
        const todos = modoAtual === 'COMPARE' ? [...dadosVitoria, ...dadosPinheiro] : (modoAtual === 'VITORIA' ? dadosVitoria : dadosPinheiro);
        const filtrados = filtrarPeriodo(todos);
        const { ranking } = processarDados(filtrados);
        const podium = ranking.slice(0,3);
        
        const container = document.getElementById('podiumContainer');
        if(!podium.length) {
            container.innerHTML = '<div class="text-center text-slate-500 w-full">Sem dados no período</div>';
            return;
        }
        
        const items = [];
        if(podium[1]) items.push({ ...podium[1], class: 'avatar-lg', medal: '🥈' });
        if(podium[0]) items.push({ ...podium[0], class: 'avatar-xl', medal: '🥇' });
        if(podium[2]) items.push({ ...podium[2], class: 'avatar-md', medal: '🥉' });
        
        container.innerHTML = items.map(item => {
            const foto = fotos[item.nome.replace(/\s/g,'_')] || `https://ui-avatars.com/api/?name=${encodeURIComponent(item.nome)}&background=1e293b&color=fff&size=100&bold=true`;
            return `<div class="podium-item">
                <div class="${item.class}"><img src="${foto}"></div>
                <div class="text-xs font-bold mt-1">${item.nome.split(' ')[0]}</div>
                <div class="text-lg font-black text-blue-500">${item.qtd}</div>
                <div class="text-sm">${item.medal}</div>
            </div>`;
        }).join('');
    }

    function renderizarStock() {
        const container = document.getElementById('stockCard');
        
        const totalV = estoqueVitoria.length;
        const comV = estoqueVitoria.filter(i => i.endereco && !["", "null", "0", "sem"].includes(String(i.endereco).trim().toLowerCase())).length;
        const semV = totalV - comV;
        const percV = totalV ? Math.round((comV / totalV) * 100) : 0;
        
        const totalP = estoquePinheiro.length;
        const comP = estoquePinheiro.filter(i => i.endereco && !["", "null", "0", "sem"].includes(String(i.endereco).trim().toLowerCase())).length;
        const semP = totalP - comP;
        const percP = totalP ? Math.round((comP / totalP) * 100) : 0;
        
        if (modoAtual === 'COMPARE') {
            container.innerHTML = `
                <div class="card-header"><i class="fas fa-boxes mr-2"></i> ESTOQUE</div>
                <div class="p-3">
                    <div class="grid-compare" style="gap:12px">
                        <div class="stock-card">
                            <div class="stat-number text-blue-500">${totalV}</div>
                            <div class="stat-label">TOTAL DE ITENS</div>
                            <div class="progress-bar mt-2"><div class="progress-fill bg-blue-500" style="width:${percV}%"></div></div>
                            <div class="stat-group mt-2">
                                <div><span class="text-emerald text-lg font-black">${comV}</span><br><span class="text-[9px] text-slate-500">Endereçados</span></div>
                                <div><span class="text-rose text-lg font-black">${semV}</span><br><span class="text-[9px] text-slate-500">Sem endereço</span></div>
                                <div><span class="text-blue text-lg font-black">${percV}%</span><br><span class="text-[9px] text-slate-500">Ocupação</span></div>
                            </div>
                            <button onclick="uploadEstoque('VITORIA')" class="btn-upload w-full mt-3">📤 UPLOAD</button>
                        </div>
                        <div class="stock-card">
                            <div class="stat-number text-yellow-500">${totalP}</div>
                            <div class="stat-label">TOTAL DE ITENS</div>
                            <div class="progress-bar mt-2"><div class="progress-fill bg-yellow-500" style="width:${percP}%"></div></div>
                            <div class="stat-group mt-2">
                                <div><span class="text-emerald text-lg font-black">${comP}</span><br><span class="text-[9px] text-slate-500">Endereçados</span></div>
                                <div><span class="text-rose text-lg font-black">${semP}</span><br><span class="text-[9px] text-slate-500">Sem endereço</span></div>
                                <div><span class="text-yellow text-lg font-black">${percP}%</span><br><span class="text-[9px] text-slate-500">Ocupação</span></div>
                            </div>
                            <button onclick="uploadEstoque('PINHEIRO')" class="btn-upload w-full mt-3">📤 UPLOAD</button>
                        </div>
                    </div>
                </div>
            `;
        } else if (modoAtual === 'VITORIA') {
            container.innerHTML = `
                <div class="card-header"><i class="fas fa-boxes mr-2"></i> ESTOQUE VD VITÓRIA</div>
                <div class="p-3">
                    <div class="stock-card">
                        <div class="stat-number text-blue-500">${totalV}</div>
                        <div class="stat-label">TOTAL DE ITENS</div>
                        <div class="progress-bar mt-2"><div class="progress-fill bg-blue-500" style="width:${percV}%"></div></div>
                        <div class="stat-group mt-3">
                            <div><span class="text-emerald text-xl font-black">${comV}</span><br><span class="text-[9px] text-slate-500">Endereçados</span></div>
                            <div><span class="text-rose text-xl font-black">${semV}</span><br><span class="text-[9px] text-slate-500">Sem endereço</span></div>
                            <div><span class="text-blue text-xl font-black">${percV}%</span><br><span class="text-[9px] text-slate-500">Ocupação</span></div>
                        </div>
                        <button onclick="uploadEstoque('VITORIA')" class="btn-upload w-full mt-4">📤 UPLOAD PLANILHA</button>
                        <button onclick="verSemEndereco('VITORIA')" class="w-full mt-2 text-[10px] text-rose-400 hover:text-rose-300">🔍 Ver itens sem localização</button>
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="card-header"><i class="fas fa-boxes mr-2"></i> ESTOQUE VD PINHEIRO</div>
                <div class="p-3">
                    <div class="stock-card">
                        <div class="stat-number text-yellow-500">${totalP}</div>
                        <div class="stat-label">TOTAL DE ITENS</div>
                        <div class="progress-bar mt-2"><div class="progress-fill bg-yellow-500" style="width:${percP}%"></div></div>
                        <div class="stat-group mt-3">
                            <div><span class="text-emerald text-xl font-black">${comP}</span><br><span class="text-[9px] text-slate-500">Endereçados</span></div>
                            <div><span class="text-rose text-xl font-black">${semP}</span><br><span class="text-[9px] text-slate-500">Sem endereço</span></div>
                            <div><span class="text-yellow text-xl font-black">${percP}%</span><br><span class="text-[9px] text-slate-500">Ocupação</span></div>
                        </div>
                        <button onclick="uploadEstoque('PINHEIRO')" class="btn-upload w-full mt-4">📤 UPLOAD PLANILHA</button>
                        <button onclick="verSemEndereco('PINHEIRO')" class="w-full mt-2 text-[10px] text-rose-400 hover:text-rose-300">🔍 Ver itens sem localização</button>
                    </div>
                </div>
            `;
        }
    }

    window.uploadEstoque = (unidadeKey) => {
        const input = document.getElementById('fileInput');
        input.onchange = async e => {
            const file = e.target.files[0];
            if (!file) return notificar("Selecione um arquivo", true);
            const path = unidadeKey === 'VITORIA' ? 'estoque_vitoria' : 'estoque_pinheiro';
            const nome = unidadeKey === 'VITORIA' ? 'VD VITÓRIA' : 'VD PINHEIRO';
            notificar(`Enviando estoque para ${nome}...`);
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                const processed = rows.slice(1).map(row => ({
                    codigo: String(row[0] || "").trim().toUpperCase(),
                    descricao: String(row[1] || "SEM DESCRIÇÃO").trim().toUpperCase(),
                    endereco: String(row[4] || "").trim().toLowerCase(),
                    disponivel: parseFloat(row[10]) || 0
                })).filter(x => x.codigo);
                db.ref(path).set(processed).then(() => notificar(`✅ ${nome}: ${processed.length} itens`));
            };
            reader.readAsArrayBuffer(file);
        };
        input.click();
    };

    window.verSemEndereco = (unidadeKey) => {
        const estoque = unidadeKey === 'VITORIA' ? estoqueVitoria : estoquePinheiro;
        const sem = estoque.filter(i => ["", "null", "0", "sem"].includes(String(i.endereco).trim().toLowerCase()));
        const tbody = document.getElementById('modalTableBody');
        tbody.innerHTML = sem.slice(0, 50).map(i => `<tr><td class="text-blue-500 font-mono text-xs">${i.codigo}</td><td class="text-xs">${i.descricao?.substring(0, 50) || '-'}</td><td class="text-right text-rose-500 font-bold">${i.disponivel}</td></td>`).join('') || '<tr><td colspan="3" class="text-center text-emerald-500 py-4">✅ Todos os itens têm endereço!</td></tr>';
        document.getElementById('modalEndereco').classList.remove('hidden');
    };

    window.closeModal = () => document.getElementById('modalEndereco').classList.add('hidden');
    
    window.uploadFoto = (nome) => {
        const input = document.getElementById('fileInput');
        input.onchange = async e => {
            const file = e.target.files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('image', file);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=6161a9db426f51baa788f0823269c981', { method: 'POST', body: fd });
                const r = await res.json();
                if (r.success) db.ref('fotos_separadores/' + nome.replace(/\s/g, '_')).set(r.data.url);
                notificar("📸 Foto enviada!");
            } catch (err) { notificar("Erro ao enviar foto", true); }
        };
        input.click();
    };

    function setFilter(tipo) {
        filtroAtual = tipo;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        const btnMap = { hoje: 'btnHoje', semana: 'btnSemana', mes: 'btnMes' };
        const btn = document.getElementById(btnMap[tipo]);
        if (btn) btn.classList.add('active');
        atualizarUI();
        tempoProgresso = 0;
    }

    setInterval(() => {
        if ((dadosVitoria.length || dadosPinheiro.length) && filtroAtual !== 'personalizado') {
            tempoProgresso += 0.5;
            document.getElementById('timelineBar').style.width = tempoProgresso + '%';
            if (tempoProgresso >= 100) {
                const ciclos = ['hoje', 'semana', 'mes'];
                const next = ciclos[(ciclos.indexOf(filtroAtual) + 1) % 3];
                setFilter(next);
                tempoProgresso = 0;
            }
        }
    }, 150);

    document.getElementById('unidadeSelect').addEventListener('change', (e) => {
        modoAtual = e.target.value;
        atualizarUI();
    });

    carregarTudo();
</script>
</body>
