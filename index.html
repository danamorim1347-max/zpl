<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Validades | Controle de Estoque</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --info: #3b82f6;
            --border: #e5e7eb;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --inconsistencia: #f97316;
            --inconsistencia-hover: #ea580c;
            --inconsistencia-bg: #fff7ed;
        }

        .dark-mode {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #374151;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            --inconsistencia-bg: #431407;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            max-width: 380px;
            animation: slideIn 0.3s ease forwards;
            border-left: 4px solid;
            pointer-events: auto;
            color: var(--text-primary);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.info { border-left-color: var(--accent); }
        .toast.inconsistencia { border-left-color: var(--inconsistencia); }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: var(--success); color: white; }
        .toast.error .toast-icon { background: var(--danger); color: white; }
        .toast.warning .toast-icon { background: var(--warning); color: white; }
        .toast.info .toast-icon { background: var(--accent); color: white; }
        .toast.inconsistencia .toast-icon { background: var(--inconsistencia); color: white; }

        .toast-content {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
            word-break: break-word;
        }

        .toast-close {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        .toast.fade-out {
            animation: slideOut 0.3s ease forwards;
        }

        .header {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .theme-toggle, .export-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .theme-toggle:hover, .export-btn:hover {
            background: var(--accent);
            color: white;
        }

        .upload-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }

        .upload-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(79, 70, 229, 0.05);
        }

        .upload-area i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .upload-area span {
            font-weight: 600;
            color: var(--accent);
        }

        .upload-area small {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .upload-status {
            font-size: 0.85rem;
            text-align: center;
            margin-top: 10px;
        }

        .upload-status.success { color: var(--success); }
        .upload-status.error { color: var(--danger); }
        .upload-status.info { color: var(--accent); }

        .upload-detalhes {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 8px;
        }

        .search-box {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .search-label {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
            inputmode: numeric;
            pattern: "[0-9]*";
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-search {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            height: 50px;
            white-space: nowrap;
        }

        .btn-search:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .btn-inconsistencia-search {
            background: var(--inconsistencia);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            height: 50px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        .btn-inconsistencia-search:hover {
            background: var(--inconsistencia-hover);
            transform: scale(1.02);
        }

        .dica-enter {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
        }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .status-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .status-card:hover {
            transform: translateY(-2px);
        }

        .status-card b {
            display: block;
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .status-card small {
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-card.inc-card {
            border-color: var(--inconsistencia);
            background: var(--inconsistencia-bg);
        }

        .status-card.inc-card b {
            color: var(--inconsistencia);
        }

        .filter-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .filter-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-info span {
            font-weight: 600;
            color: var(--accent);
        }

        .filtros-rapidos {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filtro-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .filtro-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .filtro-btn.novo {
            background: var(--info);
            color: white;
            border-color: var(--info);
        }

        .filtro-btn:hover {
            background: var(--accent);
            color: white;
        }

        .ordenar-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
        }

        .produtos-list {
            margin-bottom: 20px;
        }

        .list-title {
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .list-title span {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .produto-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid;
        }

        .produto-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow);
        }

        .produto-item.pendente { border-left-color: var(--warning); }
        .produto-item.concluido { border-left-color: var(--success); opacity: 0.85; }
        .produto-item.sem-vencimento { border-left-color: var(--info); }
        .produto-item.novo { border-left-color: var(--info); background: rgba(59, 130, 246, 0.05); }

        .produto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .produto-codigo {
            font-weight: 800;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .produto-status {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .status-pendente { background: #fef3c7; color: var(--warning); }
        .status-concluido { background: #d1fae5; color: var(--success); }
        .status-sem-vencimento { background: #dbeafe; color: var(--info); }
        .status-novo { background: #dbeafe; color: var(--info); }

        .produto-desc {
            font-size: 0.85rem;
            margin-bottom: 12px;
            word-break: break-word;
            color: var(--text-primary);
        }

        .produto-detalhes {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .produto-endereco {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .badge-novo {
            background: var(--info);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            gap: 20px;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 800;
            word-break: break-word;
            flex: 1;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        .modal-info {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .modal-info p {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
        }

        .inconsistencia-box {
            background: var(--inconsistencia-bg);
            border: 2px solid var(--inconsistencia);
            border-radius: 16px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }

        .inconsistencia-box i {
            font-size: 3rem;
            color: var(--inconsistencia);
            display: block;
            margin-bottom: 12px;
        }

        .inconsistencia-box h3 {
            color: var(--inconsistencia);
            font-size: 1.1rem;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .inconsistencia-box .codigo-grande {
            display: inline-block;
            background: var(--inconsistencia);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 800;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .chart-container {
            margin: 15px 0;
            padding: 15px;
            background: var(--bg-primary);
            border-radius: 16px;
            height: 180px;
            position: relative;
        }

        #graficoVendas {
            width: 100%;
            height: 100%;
        }

        .grafico-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            font-size: 0.7rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 4px;
        }

        .lotes-list {
            margin: 15px 0;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .lote-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .lote-item:last-child {
            border-bottom: none;
        }

        .lote-info {
            flex: 1;
        }

        .lote-validade {
            font-weight: 700;
            color: var(--success);
            font-size: 0.85rem;
        }

        .lote-validade.sem-vencimento {
            color: var(--info);
        }

        .lote-qtd {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .btn-remover {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-remover:hover {
            background: var(--danger-dark);
        }

        .historico-list {
            max-height: 180px;
            overflow-y: auto;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 8px;
        }

        .historico-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            gap: 10px;
            flex-wrap: wrap;
        }

        .historico-item:last-child {
            border-bottom: none;
        }

        .historico-data {
            color: var(--text-secondary);
        }

        .historico-qtd.positivo { color: var(--success); font-weight: 600; }
        .historico-qtd.negativo { color: var(--danger); font-weight: 600; }

        .modal-input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 600;
            margin: 10px 0;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-input[type="number"] {
            inputmode: numeric;
        }

        .btn-salvar {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s;
            background: var(--success);
            color: white;
        }

        .btn-salvar:hover {
            background: #059669;
        }

        .btn-sem-vencimento {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s;
            background: var(--info);
            color: white;
        }

        .btn-sem-vencimento:hover {
            background: #2563eb;
        }

        .btn-inconsistencia {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s;
            background: var(--inconsistencia);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-inconsistencia:hover {
            background: var(--inconsistencia-hover);
            transform: scale(1.02);
        }

        .btn-cancelar {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px 0;
            transition: all 0.2s;
            background: var(--danger);
            color: white;
        }

        .btn-cancelar:hover {
            background: var(--danger-dark);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            background: var(--bg-secondary);
            border-radius: 16px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .input-group { flex-direction: column; }
            .input-group input { width: 100%; }
            .btn-search, .btn-inconsistencia-search { width: 100%; justify-content: center; }
            .toast { min-width: 250px; max-width: 280px; }
            .modal-content { padding: 20px; }
            .chart-container { height: 150px; }
            .status-bar { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="container">
    <div class="header">
        <h1>📦 Gestão de Validades</h1>
        <div class="header-actions">
            <button class="export-btn" onclick="exportarRelatorio()" title="Exportar relatório">
                <i class="fas fa-download"></i> CSV
            </button>

            <button class="filtro-btn" data-filtro="pendente" onclick="aplicarFiltro('pendente')">⏳ Pendentes</button>
            <button class="filtro-btn" data-filtro="concluido" onclick="aplicarFiltro('concluido')">✅ Concluídos</button>
            <button class="filtro-btn" data-filtro="sem-vencimento" onclick="aplicarFiltro('sem-vencimento')">♾️ Sem Vencimento</button>

            <span id="result-count">0 itens</span>

        <div id="lista-estoque"></div>

<div class="modal" id="modalData" onclick="if(event.target === this) fecharModal()">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="prodNome">Carregando...</h2>
            <div class="modal-close" onclick="fecharModal()">×</div>
        </div>

        <div id="modalDynamicContent"></div>

        <button class="btn-cancelar" onclick="fecharModal()">FECHAR</button>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDr8Q2oJJ46ZANAjnV0_iSokdHnZ-YqGP4",
        authDomain: "controle-validade-de623.firebaseapp.com",
        projectId: "controle-validade-de623",
        storageBucket: "controle-validade-de623.firebasestorage.app",
        messagingSenderId: "788364390731",
        appId: "1:788364390731:web:6c92c01576a3c64ed7b8ce"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const estoqueRef = database.ref('estoque');
    const inconsistenciasRef = database.ref('inconsistencias');
    
    let inventario = {};
    let inconsistencias = {};
    let codigoAtual = null;
    let filtroAtual = 'todos';
    let grafico = null;
    let ultimaImportacao = localStorage.getItem('ultimaImportacao') || 0;

    function gerarIdValido(base, timestamp, random) {
        let id = `${base}_${timestamp}_${random}`;
        id = id.replace(/[\.\$#\[\]\/\s]/g, '_');
        return id;
    }

    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        const icon = document.querySelector('.theme-toggle i');
        if (icon) icon.classList.replace('fa-moon', 'fa-sun');
    }

    window.toggleDarkMode = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
        const icon = document.querySelector('.theme-toggle i');
        if (icon) {
            if (isDark) icon.classList.replace('fa-moon', 'fa-sun');
            else icon.classList.replace('fa-sun', 'fa-moon');
        }
    };

    function mostrarToast(mensagem, tipo = 'info') {
        const container = document.getElementById('toastContainer');
        const id = Date.now() + '_' + Math.random();
        const iconMap = { success: '✓', error: '✗', warning: '⚠', info: 'ℹ', inconsistencia: '⚠' };
        
        const toast = document.createElement('div');
        toast.className = `toast ${tipo}`;
        toast.id = id;
        toast.innerHTML = `
            <div class="toast-icon">${iconMap[tipo] || 'ℹ'}</div>
            <div class="toast-content">${mensagem}</div>
            <div class="toast-close" onclick="fecharToast('${id}')">×</div>
        `;
        container.appendChild(toast);
        
        setTimeout(() => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('fade-out');
                setTimeout(() => el.remove(), 300);
            }
        }, 5000);
    }

    window.fecharToast = (id) => {
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('fade-out');
            setTimeout(() => el.remove(), 300);
        }
    };

    estoqueRef.on('value', (snapshot) => {
        const dados = snapshot.val() || {};
        inventario = {};
        Object.entries(dados).forEach(([id, item]) => {
            if (item && item.qtde && item.qtde > 0) {
                inventario[id] = item;
            }
        });
        atualizarStatus();
        renderizarLista();
    });

    inconsistenciasRef.on('value', (snapshot) => {
        inconsistencias = snapshot.val() || {};
        atualizarStatus();
    });

    // ===== LEITURA DA PLANILHA - COM VERIFICAÇÃO DE QUANTIDADE PARA RESOLVER INCONSISTÊNCIAS =====
    document.getElementById('estoqueInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const statusDiv = document.getElementById('uploadStatus');
        const detalhesDiv = document.getElementById('uploadDetalhes');
        
        statusDiv.innerHTML = '<span class="loading-spinner"></span> Processando planilha...';
        statusDiv.className = 'upload-status info';
        detalhesDiv.innerHTML = '';
        
        try {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            
            if (!rows || rows.length < 2) throw new Error('Planilha vazia');
            
            const headers = rows[0].map(h => String(h || '').toLowerCase().trim());
            
            let colCodigo = -1, colDesc = -1, colQtde = -1;
            let colRack = -1, colLinha = -1, colColuna = -1;
            
            for (let i = 0; i < headers.length; i++) {
                const h = headers[i];
                if (h === 'cod material' || h.includes('cod material')) colCodigo = i;
                else if (h === 'desc material' || h.includes('desc material')) colDesc = i;
                else if (h === 'total físico' || h.includes('total físico')) colQtde = i;
                else if (h === 'rack' || h.includes('rack')) colRack = i;
                else if (h === 'linha prod alocado' || h.includes('linha prod')) colLinha = i;
                else if (h === 'coluna prod alocado' || h.includes('coluna prod')) colColuna = i;
            }
            
            if (colCodigo === -1) colCodigo = 0;
            if (colDesc === -1) colDesc = 1;
            if (colQtde === -1) colQtde = 8;
            
            const produtosPlanilha = new Map();
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;
                
                let codigo = String(row[colCodigo] || '').trim();
                if (!codigo || codigo === '' || codigo === 'undefined') continue;
                codigo = codigo.replace(/[^\w\-\/]/g, '');
                if (codigo === '') continue;
                
                let desc = colDesc < row.length ? String(row[colDesc] || '').trim() : codigo;
                if (desc === '' || desc === 'undefined') desc = codigo;
                
                let qtde = 0;
                if (colQtde < row.length) {
                    const valor = String(row[colQtde] || '0').replace(',', '.').replace(/[^\d.-]/g, '');
                    qtde = parseFloat(valor);
                    if (isNaN(qtde)) qtde = 0;
                }
                
                if (qtde <= 0) continue;
                
                let enderecoParts = [];
                if (colRack !== -1 && colRack < row.length && row[colRack]) enderecoParts.push(`Rack ${row[colRack]}`);
                if (colLinha !== -1 && colLinha < row.length && row[colLinha]) enderecoParts.push(`Linha ${row[colLinha]}`);
                if (colColuna !== -1 && colColuna < row.length && row[colColuna]) enderecoParts.push(`Col ${row[colColuna]}`);
                if (enderecoParts.length === 0 && row[4]) enderecoParts.push(String(row[4]).trim());
                const endereco = enderecoParts.length > 0 ? enderecoParts.join(' • ') : 'S/E';
                
                let estoqueMinimo = 0;
                if (row[11]) {
                    const minVal = String(row[11]).replace(',', '.');
                    estoqueMinimo = parseFloat(minVal);
                    if (isNaN(estoqueMinimo)) estoqueMinimo = 0;
                }
                
                if (produtosPlanilha.has(codigo)) {
                    produtosPlanilha.get(codigo).qtde += qtde;
                } else {
                    produtosPlanilha.set(codigo, {
                        codigo, desc: desc.substring(0, 100), qtde, endereco, estoqueMinimo
                    });
                }
            }
            
            if (produtosPlanilha.size === 0) throw new Error('Nenhum produto com quantidade > 0 encontrado');
            
            const snapshot = await estoqueRef.once('value');
            const existentes = snapshot.val() || {};
            
            const itensComValidade = [];
            const itensSemVencimento = [];
            const itensPendentes = [];
            
            Object.entries(existentes).forEach(([id, item]) => {
                if (!item || !item.codigo) return;
                if (item.semVencimento === true) {
                    itensSemVencimento.push({ id, ...item });
                } else if (item.done === true && item.validade && item.validade !== '') {
                    itensComValidade.push({ id, ...item });
                } else if (item.done !== true && !item.semVencimento && item.qtde > 0) {
                    itensPendentes.push({ id, ...item });
                }
            });
            
            let updates = {};
            const now = Date.now();
            let produtosPreservados = 0, produtosSubstituidos = 0, produtosRemovidos = 0, novosProdutos = 0, inconsistenciasResolvidas = 0;
            
            // Buscar inconsistências existentes
            const incSnap = await inconsistenciasRef.once('value');
            const incExistentes = incSnap.val() || {};
            
            // 1. PRESERVAR itens com validade
            for (let item of itensComValidade) {
                if (produtosPlanilha.has(item.codigo)) {
                    produtosPreservados++;
                    
                    // VERIFICAR INCONSISTÊNCIAS: só resolve se quantidade MUDOU
                    Object.entries(incExistentes).forEach(([incId, inc]) => {
                        if (inc.codigo === item.codigo && !inc.resolvido) {
                            const qtdNova = Math.round(produtosPlanilha.get(item.codigo).qtde);
                            const qtdAntiga = inc.qtdeSistema || 0;
                            
                            // SÓ resolve se a quantidade for DIFERENTE da que gerou a inconsistência
                            if (qtdNova !== qtdAntiga) {
                                updates[`INC_${incId}`] = { 
                                    resolvido: true,
                                    dataResolucao: now,
                                    quantidadeResolucao: qtdNova,
                                    observacaoResolucao: `Resolvido automaticamente. Quantidade alterada de ${qtdAntiga} para ${qtdNova}`
                                };
                                inconsistenciasResolvidas++;
                            }
                            // Se quantidade igual, NÃO resolve - mantém a inconsistência ativa
                        }
                    });
                    
                    produtosPlanilha.delete(item.codigo);
                }
            }
            
            // 2. PRESERVAR itens sem vencimento
            for (let item of itensSemVencimento) {
                if (produtosPlanilha.has(item.codigo)) {
                    produtosPreservados++;
                    
                    // Mesma lógica: só resolve inconsistência se quantidade mudou
                    Object.entries(incExistentes).forEach(([incId, inc]) => {
                        if (inc.codigo === item.codigo && !inc.resolvido) {
                            const qtdNova = Math.round(produtosPlanilha.get(item.codigo).qtde);
                            const qtdAntiga = inc.qtdeSistema || 0;
                            
                            if (qtdNova !== qtdAntiga) {
                                updates[`INC_${incId}`] = { 
                                    resolvido: true,
                                    dataResolucao: now,
                                    quantidadeResolucao: qtdNova,
                                    observacaoResolucao: `Resolvido automaticamente. Quantidade alterada de ${qtdAntiga} para ${qtdNova}`
                                };
                                inconsistenciasResolvidas++;
                            }
                        }
                    });
                    
                    produtosPlanilha.delete(item.codigo);
                }
            }
            
            // 3. REMOVER pendentes antigos
            for (let item of itensPendentes) {
                updates[item.id] = null;
                produtosRemovidos++;
            }
            
            // 4. CRIAR novos pendentes e verificar inconsistências
            for (let [codigo, plan] of produtosPlanilha) {
                const novoId = gerarIdValido(`PEND_${codigo}`, now, Math.random().toString(36).substring(2, 8));
                updates[novoId] = {
                    codigo: plan.codigo, desc: plan.desc, qtde: Math.round(plan.qtde),
                    endereco: plan.endereco, estoqueMinimo: plan.estoqueMinimo,
                    origem: 'estoque', done: false, validade: '', semVencimento: false,
                    dataCriacao: now, historico: [{ data: now, tipo: 'importacao', quantidade: Math.round(plan.qtde), origem: 'planilha' }]
                };
                novosProdutos++;
                
                // Verificar inconsistências para novos itens também
                Object.entries(incExistentes).forEach(([incId, inc]) => {
                    if (inc.codigo === codigo && !inc.resolvido) {
                        const qtdNova = Math.round(plan.qtde);
                        const qtdAntiga = inc.qtdeSistema || 0;
                        
                        // Só resolve se quantidade MUDOU
                        if (qtdNova !== qtdAntiga) {
                            updates[`INC_${incId}`] = { 
                                resolvido: true,
                                dataResolucao: now,
                                quantidadeResolucao: qtdNova,
                                observacaoResolucao: `Resolvido automaticamente. Quantidade alterada de ${qtdAntiga} para ${qtdNova}`
                            };
                            inconsistenciasResolvidas++;
                        }
                    }
                });
            }
            
            produtosSubstituidos = itensPendentes.length;
            
            if (Object.keys(updates).length > 0) {
                const estoqueUpdates = {};
                const incUpdates = {};
                Object.entries(updates).forEach(([key, value]) => {
                    if (key.startsWith('INC_')) incUpdates[key.replace('INC_', '')] = value;
                    else estoqueUpdates[key] = value;
                });
                
                if (Object.keys(estoqueUpdates).length > 0) await estoqueRef.update(estoqueUpdates);
                if (Object.keys(incUpdates).length > 0) await inconsistenciasRef.update(incUpdates);
                
                ultimaImportacao = now;
                localStorage.setItem('ultimaImportacao', ultimaImportacao);
                
                let msg = `Estoque atualizado: ${novosProdutos} novos produtos`;
                if (inconsistenciasResolvidas > 0) msg += ` | ✅ ${inconsistenciasResolvidas} inconsistências resolvidas (quantidade alterada)`;
                
                statusDiv.innerHTML = `✅ Concluído!`;
                statusDiv.className = 'upload-status success';
                detalhesDiv.innerHTML = `📦 Preservados: ${produtosPreservados} | 🔄 Substituídos: ${produtosSubstituidos} | 🆕 Novos: ${novosProdutos}${inconsistenciasResolvidas > 0 ? ` | ✅ Resolvidas: ${inconsistenciasResolvidas}` : ''}`;
                mostrarToast(msg, 'success');
            } else {
                statusDiv.innerHTML = `⚠️ Nenhuma alteração detectada`;
                statusDiv.className = 'upload-status warning';
                detalhesDiv.innerHTML = `✅ ${produtosPreservados} produtos preservados`;
                mostrarToast('Estoque já está atualizado', 'info');
            }
            
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = `❌ Erro: ${error.message}`;
            statusDiv.className = 'upload-status error';
            mostrarToast('Erro: ' + error.message, 'error');
        }
        e.target.value = '';
    });

    // ===== BUSCAR =====
    window.buscarManual = () => {
        const termo = document.getElementById('manualCode').value.trim();
        if (!termo) { mostrarToast('Digite um código para buscar', 'warning'); return; }
        
        const lotes = Object.values(inventario).filter(i => i.codigo === termo);
        
        if (lotes.length > 0) {
            mostrarTelaProdutoEncontrado(termo, lotes);
        } else {
            mostrarTelaInconsistencia(termo);
        }
    };

    document.getElementById('manualCode').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscarManual();
    });

    window.abrirModalInconsistenciaManual = () => {
        mostrarTelaInconsistencia('');
    };

    // ===== TELA: PRODUTO ENCONTRADO =====
    function mostrarTelaProdutoEncontrado(codigo, lotes) {
        codigoAtual = codigo;
        const primeiroLote = lotes[0];
        
        document.getElementById('prodNome').innerHTML = `📦 ${primeiroLote.desc || 'Sem descrição'}`;
        
        const pendentes = lotes.filter(l => !l.done && !l.semVencimento);
        const totalPendente = pendentes.reduce((acc, l) => acc + (l.qtde || 0), 0);
        
        const todasVendas = lotes.flatMap(l => l.historico || []).filter(h => h && h.tipo === 'venda');
        const ultimaVenda = todasVendas.length > 0 ? Math.max(...todasVendas.map(v => v.data)) : null;
        const diasSemVenda = ultimaVenda ? Math.floor((Date.now() - ultimaVenda) / 86400000) : 999;
        const vendas30dias = todasVendas.filter(v => (Date.now() - v.data) < 30 * 86400000).reduce((acc, v) => acc + Math.abs(v.quantidade), 0);
        
        const comValidade = lotes.filter(l => l.done && l.validade && !l.semVencimento);
        const comSemVencimento = lotes.filter(l => l.semVencimento === true);
        
        const lotesPorValidade = new Map();
        comValidade.forEach(l => {
            const key = l.validade;
            if (!lotesPorValidade.has(key)) lotesPorValidade.set(key, { validade: key, qtde: 0, ids: [], semVencimento: false });
            const grupo = lotesPorValidade.get(key);
            grupo.qtde += l.qtde || 0;
            grupo.ids.push(Object.keys(inventario).find(k => inventario[k] === l));
        });
        comSemVencimento.forEach(l => {
            const key = "SEM VENCIMENTO";
            if (!lotesPorValidade.has(key)) lotesPorValidade.set(key, { validade: "♾️ SEM VENCIMENTO", qtde: 0, ids: [], semVencimento: true });
            const grupo = lotesPorValidade.get(key);
            grupo.qtde += l.qtde || 0;
            grupo.ids.push(Object.keys(inventario).find(k => inventario[k] === l));
        });
        
        const todosHistoricos = lotes.flatMap(l => (l.historico || []).map(h => ({ ...h, desc: l.desc })))
            .sort((a, b) => b.data - a.data).slice(0, 15);
        
        // Verificar se existe inconsistência ativa para este código
        const incAtiva = Object.entries(inconsistencias).find(([_, inc]) => inc.codigo === codigo && !inc.resolvido);
        let alertaInc = '';
        if (incAtiva) {
            const inc = incAtiva[1];
            alertaInc = `
                <div class="inconsistencia-box" style="margin-bottom: 15px; padding: 12px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 1.5rem;"></i>
                    <h3 style="font-size: 0.9rem;">⚠️ INCONSISTÊNCIA ATIVA</h3>
                    <p style="font-size: 0.8rem;">Sistema: ${inc.qtdeSistema || 0} un | Físico: ${inc.qtdeFisico || 0} un</p>
                    <p style="font-size: 0.7rem; color: var(--text-secondary);">Registrado em: ${new Date(inc.dataRegistro).toLocaleDateString('pt-BR')}</p>
                </div>
            `;
        }
        
        let html = `
            ${alertaInc}
            <div class="modal-info">
                <p><strong>Código:</strong> ${codigo}</p>
                ${primeiroLote.endereco && primeiroLote.endereco !== 'S/E' ? `<p><strong>Endereço:</strong> ${primeiroLote.endereco}</p>` : ''}
                <p><strong>Total no sistema:</strong> <span style="color: var(--accent); font-weight: 700;">${lotes.reduce((acc, l) => acc + (l.qtde || 0), 0)} un</span></p>
                <p><strong>Última venda:</strong> ${ultimaVenda ? new Date(ultimaVenda).toLocaleDateString('pt-BR') : 'Nunca'}</p>
                <p><strong>Dias sem vender:</strong> ${diasSemVenda >= 999 ? 'Nunca' : diasSemVenda + ' dias'}</p>
                <p><strong>Vendas (30d):</strong> ${vendas30dias} un</p>
            </div>
            <div class="chart-container"><canvas id="graficoVendas"></canvas>
                <div class="grafico-legend">
                    <div class="legend-item"><div class="legend-color" style="background:#ef4444;"></div><span>Vendas</span></div>
                    <div class="legend-item"><div class="legend-color" style="background:#10b981;"></div><span>Reposições</span></div>
                </div>
            </div>
            <div style="font-weight:600; margin-bottom:8px;">📦 Lotes com validade:</div>
            <div id="lotesList" class="lotes-list">
                ${lotesPorValidade.size > 0 ? Array.from(lotesPorValidade.values()).map(g => `
                    <div class="lote-item">
                        <div class="lote-info">
                            <div class="lote-validade ${g.semVencimento ? 'sem-vencimento' : ''}">${g.validade}</div>
                            <div class="lote-qtd">${Math.round(g.qtde)} un</div>
                        </div>
                        <button class="btn-remover" onclick="removerLotes('${g.ids.join(',')}')">✕</button>
                    </div>
                `).join('') : '<div style="text-align:center;padding:15px;">Nenhum lote com validade</div>'}
            </div>
            <div style="font-weight:600; margin:15px 0 8px;">📊 Histórico:</div>
            <div id="historicoList" class="historico-list">
                ${todosHistoricos.length > 0 ? todosHistoricos.map(h => {
                    const data = new Date(h.data).toLocaleDateString('pt-BR');
                    const tipo = h.tipo === 'venda' ? 'Venda' : (h.tipo === 'reposicao' ? 'Reposição' : (h.tipo === 'validade_atribuida' ? 'Validade' : (h.tipo === 'inconsistencia' ? '⚠️ Inconsist.' : 'Importação')));
                    const sinal = h.tipo === 'venda' ? '▼' : (h.tipo === 'reposicao' ? '▲' : (h.tipo === 'inconsistencia' ? '⚠️' : '•'));
                    const classe = h.tipo === 'venda' ? 'negativo' : (h.tipo === 'reposicao' ? 'positivo' : (h.tipo === 'inconsistencia' ? 'negativo' : ''));
                    return `<div class="historico-item"><span class="historico-data">${data}</span><span>${tipo}</span><span class="historico-qtd ${classe}">${sinal} ${Math.abs(Math.round(h.quantidade||0))} un</span></div>`;
                }).join('') : '<div style="text-align:center;padding:15px;">Sem histórico</div>'}
            </div>
        `;
        
        if (totalPendente > 0) {
            html += `
                <div style="font-weight:600; margin-top:15px;">📦 Validar quantidade:</div>

                    <label style="font-weight:600; font-size:0.9rem;">Quantidade a validar (disp: ${Math.round(totalPendente)} un):</label>

        document.getElementById('modalDynamicContent').innerHTML = html;
        document.getElementById('modalData').style.display = 'flex';
        
        setTimeout(() => {
            renderizarGrafico(lotes.flatMap(l => l.historico || []));
            const inputData = document.getElementById('inputMesAno');
            if (inputData) {
                inputData.addEventListener('input', function(e) {
                    let v = e.target.value.replace(/\D/g, "");
                    if (v.length >= 2) v = v.substring(0,2) + "/" + v.substring(2,6);
                    e.target.value = v;

    // ===== MARCAR INCONSISTÊNCIA EM ITEM EXISTENTE =====
    window.marcarInconsistencia = async () => {
        const quantidade = parseInt(document.getElementById('inputQuantidade')?.value);
        
        if (!quantidade && quantidade !== 0) {
            mostrarToast('Digite a quantidade que está no físico', 'warning');
            return;
        }
        
        if (quantidade < 0) {
            mostrarToast('Quantidade não pode ser negativa', 'warning');
            return;
        }
        
        const itensPendentes = Object.entries(inventario)
            .filter(([_, item]) => item.codigo === codigoAtual && !item.done && !item.semVencimento && item.qtde > 0)
            .sort((a, b) => (a[1].dataCriacao || 0) - (b[1].dataCriacao || 0));
        
        if (itensPendentes.length === 0) {
            mostrarToast('Não há itens pendentes para este código', 'info');
            return;
        }
        
        const totalSistema = itensPendentes.reduce((acc, [_, item]) => acc + (item.qtde || 0), 0);
        
        if (!confirm(`⚠️ Confirmar inconsistência?\n\nSistema: ${Math.round(totalSistema)} un\nFísico: ${quantidade} un\n\nEsta operação irá:\n1. Registrar a inconsistência\n2. Zerar a quantidade pendente deste item no sistema\n\nA inconsistência só será resolvida automaticamente quando a quantidade na planilha for ALTERADA.`)) {
            return;
        }
        
        let updates = {};
        const now = Date.now();
        
        const incId = gerarIdValido(`INC_${codigoAtual}`, now, Math.random().toString(36).substring(2, 8));
        const primeiroPendente = itensPendentes[0][1];
        
        // Registrar inconsistência com a quantidade do sistema e do físico
        updates[`INC_${incId}`] = {
            codigo: codigoAtual,
            desc: primeiroPendente.desc || `Produto ${codigoAtual}`,
            qtdeSistema: Math.round(totalSistema),
            qtdeFisico: quantidade,
            dataRegistro: now,
            resolvido: false,
            tipoInconsistencia: 'quantidade_divergente'
        };
        
        // Zerar os itens pendentes
        for (let [id, item] of itensPendentes) {
            updates[id] = null;
        }
        
        try {
            const estoqueUpdates = {};
            const incUpdates = {};
            Object.entries(updates).forEach(([key, value]) => {
                if (key.startsWith('INC_')) incUpdates[key.replace('INC_', '')] = value;
                else estoqueUpdates[key] = value;
            });
            
            if (Object.keys(estoqueUpdates).length > 0) await estoqueRef.update(estoqueUpdates);
            if (Object.keys(incUpdates).length > 0) await inconsistenciasRef.update(incUpdates);
            
            mostrarToast(`⚠️ Inconsistência registrada: ${codigoAtual} (Sistema: ${Math.round(totalSistema)}un → Físico: ${quantidade}un)`, 'inconsistencia');
            fecharModal();
            document.getElementById('manualCode').value = '';
            document.getElementById('manualCode').focus();
        } catch (error) {
            console.error(error);
            mostrarToast('Erro ao registrar: ' + error.message, 'error');
        }
    };

    window.registrarInconsistencia = async () => {
        const codigo = document.getElementById('inputCodigoInconsistencia')?.value.trim() || codigoAtual;
        const desc = document.getElementById('inputDescInconsistencia')?.value.trim();
        const qtde = parseInt(document.getElementById('inputQtdeInconsistencia')?.value);
        
        if (!codigo) { mostrarToast('Digite o código do produto', 'warning'); return; }
        if (!qtde || qtde <= 0) { mostrarToast('Digite uma quantidade válida', 'warning'); return; }
        
        const now = Date.now();
        const id = gerarIdValido(`INC_${codigo}`, now, Math.random().toString(36).substring(2, 8));
        
        try {
            await inconsistenciasRef.child(id).set({
                codigo: codigo,
                desc: desc || `Produto ${codigo}`,
                qtdeSistema: 0,
                qtdeFisico: qtde,
                dataRegistro: now,
                resolvido: false,
                tipoInconsistencia: 'ausente_no_sistema'
            });
            
            mostrarToast(`⚠️ Inconsistência registrada: ${codigo} (${qtde} un no físico)`, 'inconsistencia');
            fecharModal();
            document.getElementById('manualCode').value = '';
            document.getElementById('manualCode').focus();
        } catch (error) {
            console.error(error);
            mostrarToast('Erro ao registrar: ' + error.message, 'error');
        }
    };
    
    window.salvarValidade = async () => {
        const quantidade = parseInt(document.getElementById('inputQuantidade')?.value);
        const data = document.getElementById('inputMesAno')?.value;
        
        if (!quantidade || quantidade <= 0) { mostrarToast('Digite uma quantidade válida', 'warning'); return; }
        if (!data || data.length < 7 || !/^\d{2}\/\d{4}$/.test(data)) { mostrarToast('Digite a validade no formato MM/AAAA', 'warning'); return; }
        
        const dataSalvar = "01/" + data;
        const itensPendentes = Object.entries(inventario)
            .filter(([_, item]) => item.codigo === codigoAtual && !item.done && !item.semVencimento && item.qtde > 0)
            .sort((a, b) => (a[1].dataCriacao || 0) - (b[1].dataCriacao || 0));
        
        if (itensPendentes.length === 0) { mostrarToast('Todos os lotes já têm validade', 'info'); fecharModal(); return; }
        
        const totalPendente = itensPendentes.reduce((acc, [_, item]) => acc + (item.qtde || 0), 0);
        if (quantidade > totalPendente) { mostrarToast(`Quantidade indisponível. Total pendente: ${Math.round(totalPendente)}`, 'warning'); return; }
        
        let updates = {};
        let quantidadeRestante = quantidade;
        const now = Date.now();
        const primeiroPendente = itensPendentes[0][1];
        const novoId = gerarIdValido(`${codigoAtual}_VAL`, now, Math.random().toString(36).substring(2, 8));
        
        updates[novoId] = {
            codigo: codigoAtual, desc: primeiroPendente.desc, qtde: quantidade,
            origem: 'estoque', done: true, validade: dataSalvar, semVencimento: false,
            dataCriacao: primeiroPendente.dataCriacao || now,
            historico: [...(primeiroPendente.historico || []), { data: now, tipo: 'validade_atribuida', quantidade: quantidade, validade: dataSalvar }]
        };
        
        for (let [id, item] of itensPendentes) {
            if (quantidadeRestante <= 0) break;
            const qtdDisponivel = item.qtde || 0;
            if (qtdDisponivel <= quantidadeRestante) { updates[id] = null; quantidadeRestante -= qtdDisponivel; }
            else { updates[id] = { ...item, qtde: qtdDisponivel - quantidadeRestante }; quantidadeRestante = 0; }
        }
        
        await estoqueRef.update(updates);
        mostrarToast(`${quantidade} unidades com validade ${data} adicionadas!`, 'success');
        fecharModal();
    };

    window.removerLotes = async (idsString) => {
        if (!confirm('Remover estes lotes?')) return;
        const ids = idsString.split(',');
        let updates = {};
        ids.forEach(id => { updates[id] = null; });
        await estoqueRef.update(updates);

    window.fecharModal = () => {
        document.getElementById('modalData').style.display = 'none';
        if (grafico) { grafico.destroy(); grafico = null; }
        codigoAtual = null;
        document.getElementById('manualCode').value = '';
        document.getElementById('manualCode').focus();
    };
    
    function renderizarGrafico(historico) {
        const canvas = document.getElementById('graficoVendas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const ultimos6meses = [];
        const hoje = new Date();
        for (let i = 5; i >= 0; i--) {
            const data = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
            const mes = data.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '');
            ultimos6meses.push({ mes, vendas: 0, reposicoes: 0 });
        }
        historico.forEach(h => {
            if (!h) return;
            const dataH = new Date(h.data);
            const diffMeses = (hoje.getFullYear() - dataH.getFullYear()) * 12 + (hoje.getMonth() - dataH.getMonth());
            if (diffMeses >= 0 && diffMeses < 6) {
                const index = 5 - diffMeses;
                if (h.tipo === 'venda') ultimos6meses[index].vendas += Math.abs(h.quantidade || 0);
                else if (h.tipo === 'reposicao') ultimos6meses[index].reposicoes += h.quantidade || 0;
            }
        });
        if (grafico) grafico.destroy();
        grafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ultimos6meses.map(m => m.mes),
                datasets: [
                    { label: 'Vendas', data: ultimos6meses.map(m => m.vendas), backgroundColor: '#ef4444', borderRadius: 4 },
                    { label: 'Reposições', data: ultimos6meses.map(m => m.reposicoes), backgroundColor: '#10b981', borderRadius: 4 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }
    
    window.aplicarFiltro = (filtro) => {
        filtroAtual = filtro;
        document.querySelectorAll('.filtro-btn').forEach(btn => btn.classList.remove('active'));
        const btnAtivo = document.querySelector(`.filtro-btn[data-filtro="${filtro}"]`);
        if (btnAtivo) btnAtivo.classList.add('active');
        const texts = { todos: 'TODOS', pendente: 'PENDENTES', concluido: 'CONCLUÍDOS', 'sem-vencimento': 'SEM VENCIMENTO', novos: '🆕 NOVOS' };
        document.getElementById('filterText').innerHTML = `Mostrando: ${texts[filtro] || 'TODOS'}`;
        renderizarLista();
    };
    
    function atualizarStatus() {
        const lotes = Object.values(inventario);
        document.getElementById('stat-lotes').innerText = lotes.length;
        document.getElementById('stat-pendentes').innerText = lotes.filter(l => !l.done && !l.semVencimento).length;
        document.getElementById('stat-inconsistencias').innerText = Object.values(inconsistencias).filter(inc => !inc.resolvido).length;
    }
    
    function renderizarLista() {
        const container = document.getElementById('lista-estoque');
        const ordenarPor = document.getElementById('ordenarPor').value;
        const grupos = new Map();
        Object.values(inventario).forEach(item => {
            if (!grupos.has(item.codigo)) grupos.set(item.codigo, { ...item, lotes: [item], qtde: item.qtde || 0 });
            else { const ex = grupos.get(item.codigo); ex.lotes.push(item); ex.qtde += item.qtde || 0; }
        });
        let produtos = Array.from(grupos.values());
        produtos.forEach(prod => {
            prod.temPendente = prod.lotes.some(l => !l.done && !l.semVencimento);
            prod.temConcluido = prod.lotes.some(l => l.done && !l.semVencimento);
            prod.temSemVencimento = prod.lotes.some(l => l.semVencimento === true);
            prod.ehNovo = prod.dataCriacao && prod.dataCriacao >= ultimaImportacao && ultimaImportacao > 0 && prod.temPendente;
        });
        if (filtroAtual !== 'todos') {
            produtos = produtos.filter(prod => {
                if (filtroAtual === 'pendente') return prod.temPendente && !prod.temConcluido && !prod.temSemVencimento;
                if (filtroAtual === 'concluido') return prod.temConcluido && !prod.temPendente && !prod.temSemVencimento;
                if (filtroAtual === 'sem-vencimento') return prod.temSemVencimento && !prod.temPendente;
                if (filtroAtual === 'novos') return prod.ehNovo;
                return true;
            });
        }
        produtos.sort((a, b) => {
            switch(ordenarPor) {
                case 'quantidade': return (b.qtde||0) - (a.qtde||0);
                case 'quantidade-menor': return (a.qtde||0) - (b.qtde||0);
                case 'codigo': return (a.codigo||'').localeCompare(b.codigo||'');
                case 'nome': return (a.desc||'').localeCompare(b.desc||'');
                case 'data': return (b.dataCriacao||0) - (a.dataCriacao||0);
                default: return (b.qtde||0) - (a.qtde||0);
            }
        });
        document.getElementById('result-count').innerText = `${produtos.length} itens`;
        if (produtos.length === 0) { container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>Nenhum produto</p></div>`; return; }
        container.innerHTML = produtos.map(prod => {
            let status = 'pendente', statusText = 'Pendente', statusClass = 'status-pendente';
            if (prod.ehNovo) { status = 'novo'; statusText = '🆕 Novo'; statusClass = 'status-novo'; }
            else if (prod.temSemVencimento && !prod.temPendente) { status = 'sem-vencimento'; statusText = '♾️ Sem Venc.'; statusClass = 'status-sem-vencimento'; }
            else if (prod.temConcluido && !prod.temPendente && !prod.temSemVencimento) { status = 'concluido'; statusText = 'Concluído'; statusClass = 'status-concluido'; }
            const badgeNovo = prod.ehNovo ? '<span class="badge-novo">🆕</span>' : '';
            return `<div class="produto-item ${status}" onclick="document.getElementById('manualCode').value='${prod.codigo}';buscarManual();">
                <div class="produto-header"><span class="produto-codigo">📦 ${prod.codigo} ${badgeNovo}</span><span class="produto-status ${statusClass}">${statusText}</span></div>
                <div class="produto-desc">${(prod.desc||'Sem descrição').substring(0,60)}</div>
                <div class="produto-detalhes"><span><i class="fas fa-box"></i> ${Math.round(prod.qtde)} un</span></div>
                ${prod.endereco && prod.endereco !== 'S/E' ? `<div class="produto-endereco"><i class="fas fa-map-marker-alt"></i> ${prod.endereco}</div>` : ''}
            </div>`;
        }).join('');
    }
    
    window.exportarRelatorio = () => {
        const grupos = new Map();
        Object.values(inventario).forEach(item => {
            if (!grupos.has(item.codigo)) grupos.set(item.codigo, { ...item, quantidade: item.qtde || 0 });
            else grupos.get(item.codigo).quantidade += item.qtde || 0;
        });
        let csv = "Código;Descrição;Quantidade;Status;Validade;NovoItem\n";
        Array.from(grupos.values()).forEach(p => {
            let status = 'Pendente', validade = '', novoItem = 'Não';
            if (p.semVencimento) { status = 'Sem Vencimento'; validade = 'SEM VENCIMENTO'; }
            else if (p.done && p.validade) { status = 'Concluído'; validade = p.validade; }
            if (p.dataCriacao && p.dataCriacao >= ultimaImportacao && ultimaImportacao > 0 && !p.done && !p.semVencimento) novoItem = 'Sim';
            csv += `${p.codigo};${p.desc||''};${Math.round(p.quantidade)};${status};${validade};${novoItem}\n`;
        });
        const incsAtivas = Object.values(inconsistencias).filter(inc => !inc.resolvido);
        if (incsAtivas.length > 0) {
            csv += "\n--- INCONSISTÊNCIAS ---\nCódigo;Descrição;Qtde Sistema;Qtde Físico;Data Registro;Tipo\n";
            incsAtivas.forEach(inc => csv += `${inc.codigo};${inc.desc||''};${inc.qtdeSistema||0};${inc.qtdeFisico||0};${new Date(inc.dataRegistro).toLocaleDateString('pt-BR')};${inc.tipoInconsistencia||'N/I'}\n`);
        }
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `produtos_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.csv`;
        link.click(); URL.revokeObjectURL(link.href);
        mostrarToast('Relatório exportado!', 'success');
    };
</script>
</body>
</html>
