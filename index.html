<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Validades | Controle de Estoque</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --info: #3b82f6;
            --border: #e5e7eb;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .dark-mode {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --border: #374151;
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            max-width: 380px;
            animation: slideIn 0.3s ease forwards;
            border-left: 4px solid;
            pointer-events: auto;
            color: var(--text-primary);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.info { border-left-color: var(--accent); }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { background: var(--success); color: white; }
        .toast.error .toast-icon { background: var(--danger); color: white; }
        .toast.warning .toast-icon { background: var(--warning); color: white; }
        .toast.info .toast-icon { background: var(--accent); color: white; }

        .toast-content {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
            word-break: break-word;
        }

        .toast-close {
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        .toast.fade-out {
            animation: slideOut 0.3s ease forwards;
        }

        .header {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .theme-toggle, .export-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 14px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .theme-toggle:hover, .export-btn:hover {
            background: var(--accent);
            color: white;
        }

        .upload-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--card-shadow);
        }

        .upload-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(79, 70, 229, 0.05);
        }

        .upload-area i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .upload-area span {
            font-weight: 600;
            color: var(--accent);
        }

        .upload-area small {
            display: block;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .upload-status {
            font-size: 0.85rem;
            text-align: center;
            margin-top: 10px;
        }

        .upload-status.success { color: var(--success); }
        .upload-status.error { color: var(--danger); }
        .upload-status.info { color: var(--accent); }

        .upload-detalhes {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 8px;
        }

        .search-box {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .search-label {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
            inputmode: numeric;
            pattern: "[0-9]*";
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn-search {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            height: 50px;
        }

        .btn-search:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .dica-enter {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 8px;
            text-align: center;
        }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .status-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .status-card:hover {
            transform: translateY(-2px);
        }

        .status-card b {
            display: block;
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .status-card small {
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .filter-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .filter-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-info span {
            font-weight: 600;
            color: var(--accent);
        }

        .filtros-rapidos {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filtro-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .filtro-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .filtro-btn.novo {
            background: var(--info);
            color: white;
            border-color: var(--info);
        }

        .filtro-btn:hover {
            background: var(--accent);
            color: white;
        }

        .ordenar-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
        }

        .produtos-list {
            margin-bottom: 20px;
        }

        .list-title {
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .list-title span {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .produto-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid;
        }

        .produto-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow);
        }

        .produto-item.pendente { border-left-color: var(--warning); }
        .produto-item.concluido { border-left-color: var(--success); opacity: 0.85; }
        .produto-item.sem-vencimento { border-left-color: var(--info); }
        .produto-item.novo { border-left-color: var(--info); background: rgba(59, 130, 246, 0.05); }

        .produto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .produto-codigo {
            font-weight: 800;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .produto-status {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 30px;
            white-space: nowrap;
        }

        .status-pendente { background: #fef3c7; color: var(--warning); }
        .status-concluido { background: #d1fae5; color: var(--success); }
        .status-sem-vencimento { background: #dbeafe; color: var(--info); }
        .status-novo { background: #dbeafe; color: var(--info); }

        .produto-desc {
            font-size: 0.85rem;
            margin-bottom: 12px;
            word-break: break-word;
            color: var(--text-primary);
        }

        .produto-detalhes {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .produto-endereco {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
            background: rgba(79, 70, 229, 0.1);
            padding: 4px 8px;
            border-radius: 8px;
            display: inline-flex;
            width: fit-content;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .badge-novo {
            background: var(--info);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            gap: 20px;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 800;
            word-break: break-word;
            flex: 1;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .modal-close:hover {
            background: var(--danger);
            color: white;
        }

        .modal-info {
            background: var(--bg-primary);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .modal-info p {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
        }

        .chart-container {
            margin: 15px 0;
            padding: 15px;
            background: var(--bg-primary);
            border-radius: 16px;
            height: 180px;
            position: relative;
        }

        #graficoVendas {
            width: 100%;
            height: 100%;
        }

        .grafico-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            font-size: 0.7rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 4px;
        }

        .lotes-list {
            margin: 15px 0;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .lote-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .lote-item:last-child {
            border-bottom: none;
        }

        .lote-info {
            flex: 1;
        }

        .lote-validade {
            font-weight: 700;
            color: var(--success);
            font-size: 0.85rem;
        }

        .lote-validade.sem-vencimento {
            color: var(--info);
        }

        .lote-qtd {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .btn-remover {
            background: var(--danger);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-remover:hover {
            background: var(--danger-dark);
        }

        .historico-list {
            max-height: 180px;
            overflow-y: auto;
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 8px;
        }

        .historico-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            gap: 10px;
            flex-wrap: wrap;
        }

        .historico-item:last-child {
            border-bottom: none;
        }

        .historico-data {
            color: var(--text-secondary);
        }

        .historico-qtd.positivo { color: var(--success); font-weight: 600; }
        .historico-qtd.negativo { color: var(--danger); font-weight: 600; }

        .modal-input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 600;
            margin: 10px 0;
            outline: none;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-input[type="number"] {
            inputmode: numeric;
        }

        .btn-salvar {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s;
            background: var(--success);
            color: white;
        }

        .btn-salvar:hover {
            background: #059669;
        }

        .btn-sem-vencimento {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s;
            background: var(--info);
            color: white;
        }

        .btn-sem-vencimento:hover {
            background: #2563eb;
        }

        .btn-cancelar {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px 0;
            transition: all 0.2s;
            background: var(--danger);
            color: white;
        }

        .btn-cancelar:hover {
            background: var(--danger-dark);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            background: var(--bg-secondary);
            border-radius: 16px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .input-group { flex-direction: column; }
            .input-group input { width: 100%; }
            .btn-search { width: 100%; }
            .toast { min-width: 250px; max-width: 280px; }
            .modal-content { padding: 20px; }
            .chart-container { height: 150px; }
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="container">
    <div class="header">
        <h1>📦 Gestão de Validades</h1>
        <div class="header-actions">
            <button class="export-btn" onclick="exportarRelatorio()" title="Exportar relatório">
                <i class="fas fa-download"></i> CSV
            </button>
            <button class="theme-toggle" onclick="toggleDarkMode()" title="Alternar tema">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </div>

    <div class="upload-card">
        <div class="upload-title">
            <i class="fas fa-file-excel" style="color: var(--success);"></i>
            Importar Planilha de Estoque
        </div>
        <label class="upload-area">
            <i class="fas fa-upload"></i>
            <span>SELECIONAR PLANILHA</span>
            <small>Formatos: .xlsx, .xls, .csv</small>
            <input type="file" id="estoqueInput" accept=".xlsx,.xls,.csv" style="display:none">
        </label>
        <div id="uploadStatus" class="upload-status"></div>
        <div id="uploadDetalhes" class="upload-detalhes"></div>
    </div>

    <div class="search-box">
        <div class="search-label">🔍 Buscar produto</div>
        <div class="input-group">
            <input type="text" id="manualCode" placeholder="Digite o código do produto..." autocomplete="off" inputmode="numeric" pattern="[0-9]*">
            <button class="btn-search" onclick="buscarManual()">
                <i class="fas fa-search"></i> Buscar
            </button>
        </div>
        <div class="dica-enter">Digite o código e pressione ENTER</div>
    </div>

    <div class="status-bar">
        <div class="status-card">
            <b><span id="stat-lotes">0</span></b>
            <small>LOTES</small>
        </div>
        <div class="status-card">
            <b><span id="stat-pendentes">0</span></b>
            <small>PENDENTES</small>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-info">
            <i class="fas fa-filter"></i>
            <span id="filterText">Mostrando: TODOS OS PRODUTOS</span>
        </div>

        <div class="filtros-rapidos">
            <button class="filtro-btn active" data-filtro="todos" onclick="aplicarFiltro('todos')">📋 Todos</button>
            <button class="filtro-btn" data-filtro="pendente" onclick="aplicarFiltro('pendente')">⏳ Pendentes</button>
            <button class="filtro-btn" data-filtro="concluido" onclick="aplicarFiltro('concluido')">✅ Concluídos</button>
            <button class="filtro-btn" data-filtro="sem-vencimento" onclick="aplicarFiltro('sem-vencimento')">♾️ Sem Vencimento</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDr8Q2oJJ46ZANAjnV0_iSokdHnZ-YqGP4",
        authDomain: "controle-validade-de623.firebaseapp.com",
        projectId: "controle-validade-de623",
        storageBucket: "controle-validade-de623.firebasestorage.app",
        messagingSenderId: "788364390731",
        appId: "1:788364390731:web:6c92c01576a3c64ed7b8ce"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const estoqueRef = database.ref('estoque');
    
    let inventario = {};
    let codigoAtual = null;
    let filtroAtual = 'todos';
    let grafico = null;
    
    let ultimaImportacao = localStorage.getItem('ultimaImportacao') || 0;

    // Função para formatar endereço no padrão R1.R1.1/A
    function formatarEndereco(estacao, rack, linha, coluna) {
        const partes = [];
        
        // Extrair número da estação (ex: "RUA 02" -> "2", "RUA P.V" -> "PV")
        let estacaoNum = '';
        if (estacao && estacao !== '') {
            const matchEst = String(estacao).match(/\d+/) || String(estacao).match(/[A-Z]+\.?[A-Z]?/);
            if (matchEst) {
                estacaoNum = matchEst[0].replace(/^0+/, ''); // Remove zeros à esquerda
                if (estacaoNum === '') estacaoNum = String(estacao).substring(0, 2);
            } else {
                estacaoNum = String(estacao).substring(0, 2);
            }
        } else {
            estacaoNum = '?';
        }
        partes.push(estacaoNum);
        
        // Extrair número do rack
        let rackNum = '';
        if (rack && rack !== '') {
            const matchRack = String(rack).match(/\d+/);
            rackNum = matchRack ? matchRack[0] : String(rack);
        } else {
            rackNum = '?';
        }
        partes.push(rackNum);
        
        // Extrair número da linha
        let linhaNum = '';
        if (linha && linha !== '') {
            const matchLinha = String(linha).match(/\d+/);
            linhaNum = matchLinha ? matchLinha[0] : String(linha);
        } else {
            linhaNum = '?';
        }
        partes.push(linhaNum);
        
        // Coluna (letra)
        let colunaLetra = '';
        if (coluna && coluna !== '') {
            const matchCol = String(coluna).match(/[A-Za-z]+/);
            colunaLetra = matchCol ? matchCol[0] : String(coluna);
        } else {
            colunaLetra = '?';
        }
        
        return `${partes.join('.')}/${colunaLetra}`;
    }

    function gerarIdValido(base, timestamp, random) {
        let id = `${base}_${timestamp}_${random}`;
        id = id.replace(/[\.\$#\[\]\/\s]/g, '_');
        return id;
    }

    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        const icon = document.querySelector('.theme-toggle i');
        if (icon) icon.classList.replace('fa-moon', 'fa-sun');
    }

    window.toggleDarkMode = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
        const icon = document.querySelector('.theme-toggle i');
        if (icon) {
            if (isDark) icon.classList.replace('fa-moon', 'fa-sun');
            else icon.classList.replace('fa-sun', 'fa-moon');
        }
    };

    function mostrarToast(mensagem, tipo = 'info') {
        const container = document.getElementById('toastContainer');
        const id = Date.now() + '_' + Math.random();
        const iconMap = { success: '✓', error: '✗', warning: '⚠', info: 'ℹ' };
        
        const toast = document.createElement('div');
        toast.className = `toast ${tipo}`;
        toast.id = id;
        toast.innerHTML = `
            <div class="toast-icon">${iconMap[tipo] || 'ℹ'}</div>
            <div class="toast-content">${mensagem}</div>
            <div class="toast-close" onclick="fecharToast('${id}')">×</div>
        `;
        container.appendChild(toast);
        
        setTimeout(() => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('fade-out');
                setTimeout(() => el.remove(), 300);
            }
        }, 5000);
    }

    window.fecharToast = (id) => {
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('fade-out');
            setTimeout(() => el.remove(), 300);
        }
    };

    estoqueRef.on('value', (snapshot) => {
        const dados = snapshot.val() || {};
        inventario = {};
        Object.entries(dados).forEach(([id, item]) => {
            if (item && item.qtde && item.qtde > 0) {
                if (item.qtde) item.qtde = Math.round(item.qtde);
                inventario[id] = item;
            }
        });
        atualizarStatus();
        renderizarLista();
    });

    // ===== LEITURA DA PLANILHA COM NOVO FORMATO DE ENDEREÇO =====
    document.getElementById('estoqueInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const statusDiv = document.getElementById('uploadStatus');
        const detalhesDiv = document.getElementById('uploadDetalhes');
        
        statusDiv.innerHTML = '<span class="loading-spinner"></span> Processando planilha...';
        statusDiv.className = 'upload-status info';
        detalhesDiv.innerHTML = '';
        
        try {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data);
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            
            if (!rows || rows.length < 2) throw new Error('Planilha vazia');
            
            const headers = rows[0].map(h => String(h || '').toLowerCase().trim());
            
            let colCodigo = -1, colDesc = -1, colQtde = -1;
            let colEstacao = -1, colRack = -1, colLinha = -1, colColuna = -1;
            
            for (let i = 0; i < headers.length; i++) {
                const h = headers[i];
                if (h === 'cod material' || h.includes('cod material')) colCodigo = i;
                else if (h === 'desc material' || h.includes('desc material')) colDesc = i;
                else if (h === 'total físico' || h.includes('total físico')) colQtde = i;
                else if (h === 'estacao' || h.includes('estacao')) colEstacao = i;
                else if (h === 'rack' || h.includes('rack')) colRack = i;
                else if (h === 'linha prod alocado' || h.includes('linha prod')) colLinha = i;
                else if (h === 'coluna prod alocado' || h.includes('coluna prod')) colColuna = i;
            }
            
            if (colCodigo === -1) colCodigo = 0;
            if (colDesc === -1) colDesc = 1;
            if (colQtde === -1) colQtde = 8;
            
            // Mapear produtos da planilha (SOMA todas as linhas por código)
            const produtosPlanilha = new Map();
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;
                
                let codigo = String(row[colCodigo] || '').trim();
                if (!codigo || codigo === '' || codigo === 'undefined') continue;
                codigo = codigo.replace(/[^\w\-\/]/g, '');
                if (codigo === '') continue;
                
                let desc = colDesc < row.length ? String(row[colDesc] || '').trim() : codigo;
                if (desc === '' || desc === 'undefined') desc = codigo;
                
                let qtde = 0;
                if (colQtde < row.length) {
                    const valor = String(row[colQtde] || '0').replace(',', '.').replace(/[^\d.-]/g, '');
                    qtde = parseFloat(valor);
                    if (isNaN(qtde)) qtde = 0;
                }
                qtde = Math.round(qtde);
                
                if (qtde <= 0) continue;
                
                // Capturar dados do endereço
                let estacao = (colEstacao !== -1 && colEstacao < row.length) ? String(row[colEstacao] || '').trim() : '';
                let rack = (colRack !== -1 && colRack < row.length) ? String(row[colRack] || '').trim() : '';
                let linha = (colLinha !== -1 && colLinha < row.length) ? String(row[colLinha] || '').trim() : '';
                let coluna = (colColuna !== -1 && colColuna < row.length) ? String(row[colColuna] || '').trim() : '';
                
                // Fallback para colunas alternativas
                if (!estacao && row[4]) estacao = String(row[4]).trim();
                if (!rack && row[5]) rack = String(row[5]).trim();
                
                // Formatar endereço no padrão R1.R1.1/A
                let enderecoFormatado = 'S/E';
                if ((estacao && estacao !== '') || (rack && rack !== '') || (linha && linha !== '') || (coluna && coluna !== '')) {
                    enderecoFormatado = formatarEndereco(estacao, rack, linha, coluna);
                } else if (row[4] && row[4] !== '') {
                    enderecoFormatado = String(row[4]).trim();
                }
                
                let estoqueMinimo = 0;
                if (row[11]) {
                    const minVal = String(row[11]).replace(',', '.');
                    estoqueMinimo = parseFloat(minVal);
                    if (isNaN(estoqueMinimo)) estoqueMinimo = 0;
                }
                estoqueMinimo = Math.round(estoqueMinimo);
                
                // SOMA as quantidades de todas as linhas do mesmo código
                if (produtosPlanilha.has(codigo)) {
                    const existing = produtosPlanilha.get(codigo);
                    existing.qtde += qtde;
                    if (desc && desc !== codigo && (!existing.desc || existing.desc === existing.codigo)) {
                        existing.desc = desc.substring(0, 100);
                    }
                    // Mantém o primeiro endereço encontrado (prioriza o que não é S/E)
                    if (enderecoFormatado !== 'S/E' && (existing.endereco === 'S/E' || !existing.endereco)) {
                        existing.endereco = enderecoFormatado;
                    }
                } else {
                    produtosPlanilha.set(codigo, {
                        codigo, 
                        desc: desc.substring(0, 100), 
                        qtde: qtde, 
                        endereco: enderecoFormatado, 
                        estoqueMinimo: estoqueMinimo
                    });
                }
            }
            
            if (produtosPlanilha.size === 0) {
                throw new Error('Nenhum produto com quantidade > 0 encontrado');
            }
            
            // Buscar dados existentes no Firebase
            const snapshot = await estoqueRef.once('value');
            const existentes = snapshot.val() || {};
            
            // Separar itens existentes por tipo
            const itensComValidade = [];
            const itensSemVencimento = [];
            const itensPendentes = [];
            
            Object.entries(existentes).forEach(([id, item]) => {
                if (!item || !item.codigo) return;
                if (item.qtde) item.qtde = Math.round(item.qtde);
                if (item.semVencimento === true) {
                    itensSemVencimento.push({ id, ...item });
                } else if (item.done === true && item.validade && item.validade !== '') {
                    itensComValidade.push({ id, ...item });
                } else if (item.done !== true && !item.semVencimento && item.qtde > 0) {
                    itensPendentes.push({ id, ...item });
                }
            });
            
            let updates = {};
            const now = Date.now();
            let produtosPreservados = 0;
            let produtosSubstituidos = 0;
            let novosProdutos = 0;
            let produtosRemovidos = 0;
            
            // Agrupar itens validados por código
            const validadosPorCodigo = new Map();
            const semVencimentoPorCodigo = new Map();
            
            for (let item of itensComValidade) {
                const qtdeAtual = validadosPorCodigo.get(item.codigo) || 0;
                validadosPorCodigo.set(item.codigo, qtdeAtual + (item.qtde || 0));
            }
            
            for (let item of itensSemVencimento) {
                const qtdeAtual = semVencimentoPorCodigo.get(item.codigo) || 0;
                semVencimentoPorCodigo.set(item.codigo, qtdeAtual + (item.qtde || 0));
            }
            
            // Processar cada produto da planilha
            for (let [codigo, planilha] of produtosPlanilha) {
                const qtdeValidada = validadosPorCodigo.get(codigo) || 0;
                const qtdeSemVenc = semVencimentoPorCodigo.get(codigo) || 0;
                const totalValidado = qtdeValidada + qtdeSemVenc;
                const qtdePlanilha = planilha.qtde;
                
                const itensExistentes = [
                    ...itensComValidade.filter(i => i.codigo === codigo),
                    ...itensSemVencimento.filter(i => i.codigo === codigo),
                    ...itensPendentes.filter(i => i.codigo === codigo)
                ];
                
                if (totalValidado >= qtdePlanilha) {
                    // Caso 1: Planilha tem MENOS ou IGUAL quantidade que já está validada
                    if (totalValidado > qtdePlanilha) {
                        let excesso = totalValidado - qtdePlanilha;
                        const itensParaReduzir = [...itensComValidade.filter(i => i.codigo === codigo)]
                            .sort((a, b) => (b.dataCriacao || 0) - (a.dataCriacao || 0));
                        
                        for (let item of itensParaReduzir) {
                            if (excesso <= 0) break;
                            const qtdItem = item.qtde || 0;
                            if (qtdItem <= excesso) {
                                updates[item.id] = null;
                                excesso -= qtdItem;
                                produtosRemovidos++;
                            } else {
                                updates[item.id] = {
                                    ...item,
                                    qtde: qtdItem - excesso
                                };
                                excesso = 0;
                            }
                        }
                    }
                    
                    // Preservar itens validados restantes
                    for (let item of itensExistentes) {
                        if (item.done === true || item.semVencimento === true) {
                            if (updates[item.id] !== null) {
                                updates[item.id] = {
                                    ...item,
                                    desc: planilha.desc,
                                    endereco: planilha.endereco,
                                    estoqueMinimo: planilha.estoqueMinimo
                                };
                                produtosPreservados++;
                            }
                        }
                    }
                    
                    // Remover pendentes existentes
                    for (let item of itensPendentes.filter(i => i.codigo === codigo)) {
                        updates[item.id] = null;
                        produtosSubstituidos++;
                    }
                    
                } else {
                    // Caso 2: Planilha tem MAIS quantidade que o já validado
                    const qtdeNecPendente = qtdePlanilha - totalValidado;
                    
                    // Preservar itens validados
                    for (let item of itensExistentes) {
                        if (item.done === true || item.semVencimento === true) {
                            updates[item.id] = {
                                ...item,
                                desc: planilha.desc,
                                endereco: planilha.endereco,
                                estoqueMinimo: planilha.estoqueMinimo
                            };
                            produtosPreservados++;
                        } else if (item.done !== true && !item.semVencimento) {
                            updates[item.id] = null;
                            produtosSubstituidos++;
                        }
                    }
                    
                    // Criar novo pendente com a quantidade necessária
                    if (qtdeNecPendente > 0) {
                        const novoId = gerarIdValido(`PEND_${codigo}`, now, Math.random().toString(36).substring(2, 8));
                        updates[novoId] = {
                            codigo: planilha.codigo,
                            desc: planilha.desc,
                            qtde: Math.round(qtdeNecPendente),
                            endereco: planilha.endereco,
                            estoqueMinimo: planilha.estoqueMinimo,
                            origem: 'estoque',
                            done: false,
                            validade: '',
                            semVencimento: false,
                            dataCriacao: now,
                            historico: [{
                                data: now,
                                tipo: 'importacao',
                                quantidade: Math.round(qtdeNecPendente),
                                origem: 'planilha'
                            }]
                        };
                        novosProdutos++;
                    }
                }
            }
            
            // Processar produtos que estão no sistema mas NÃO estão mais na planilha
            const todosCodigosSistema = new Set();
            [...itensComValidade, ...itensSemVencimento, ...itensPendentes].forEach(item => {
                todosCodigosSistema.add(item.codigo);
            });
            
            for (let codigo of todosCodigosSistema) {
                if (!produtosPlanilha.has(codigo)) {
                    const itensParaRemover = [
                        ...itensComValidade.filter(i => i.codigo === codigo),
                        ...itensSemVencimento.filter(i => i.codigo === codigo),
                        ...itensPendentes.filter(i => i.codigo === codigo)
                    ];
                    for (let item of itensParaRemover) {
                        updates[item.id] = null;
                        produtosRemovidos++;
                    }
                }
            }
            
            if (Object.keys(updates).length > 0) {
                await estoqueRef.update(updates);
                ultimaImportacao = now;
                localStorage.setItem('ultimaImportacao', ultimaImportacao);
                
                statusDiv.innerHTML = `✅ Concluído!`;
                statusDiv.className = 'upload-status success';
                detalhesDiv.innerHTML = `📦 Preservados: ${produtosPreservados} | 🆕 Novos pendentes: ${novosProdutos} | 🔄 Substituídos: ${produtosSubstituidos} | 🗑️ Removidos: ${produtosRemovidos}`;
                mostrarToast(`Estoque atualizado: ${novosProdutos} novos itens pendentes adicionados`, 'success');
            } else {
                statusDiv.innerHTML = `⚠️ Nenhuma alteração detectada`;
                statusDiv.className = 'upload-status warning';
                detalhesDiv.innerHTML = `✅ ${produtosPreservados} produtos preservados`;
                mostrarToast('Estoque já está atualizado', 'info');
            }
            
        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = `❌ Erro: ${error.message}`;
            statusDiv.className = 'upload-status error';
            mostrarToast('Erro: ' + error.message, 'error');
        }
        
        e.target.value = '';
    });

    window.buscarManual = () => {
        const termo = document.getElementById('manualCode').value.trim();
        if (termo) {
            abrirModal(termo);
        } else {
            mostrarToast('Digite um código para buscar', 'warning');
        }
    };

    document.getElementById('manualCode').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscarManual();
    });

    window.abrirModal = (codigo) => {
        const lotes = Object.values(inventario).filter(i => i.codigo === codigo);
        if (lotes.length === 0) {
            mostrarToast('Produto não encontrado', 'error');
            return;
        }

        codigoAtual = codigo;
        const primeiroLote = lotes[0];
        
        const pendentes = lotes.filter(l => !l.done && !l.semVencimento);
        const totalPendente = pendentes.reduce((acc, l) => acc + (l.qtde || 0), 0);
        
        const todasVendas = lotes.flatMap(l => l.historico || []).filter(h => h && h.tipo === 'venda');
        const ultimaVenda = todasVendas.length > 0 ? Math.max(...todasVendas.map(v => v.data)) : null;
        const diasSemVenda = ultimaVenda ? Math.floor((Date.now() - ultimaVenda) / 86400000) : 999;
        const vendas30dias = todasVendas.filter(v => (Date.now() - v.data) < 30 * 86400000).reduce((acc, v) => acc + Math.abs(v.quantidade), 0);
        
        document.getElementById('prodNome').innerHTML = primeiroLote.desc || 'Sem descrição';
        
        const enderecoCompleto = primeiroLote.endereco && primeiroLote.endereco !== 'S/E' ? primeiroLote.endereco : 
            (primeiroLote.lotes && primeiroLote.lotes[0]?.endereco) || 'S/E';
        
        document.getElementById('modalInfo').innerHTML = `
            <p><strong>Código:</strong> ${codigo}</p>
            ${enderecoCompleto !== 'S/E' ? `<p><strong>📍 Endereço:</strong> ${enderecoCompleto}</p>` : ''}
            <p><strong>📦 Total em estoque:</strong> ${Math.round(lotes.reduce((acc, l) => acc + (l.qtde || 0), 0))} un</p>
            <p><strong>🕐 Última venda:</strong> ${ultimaVenda ? new Date(ultimaVenda).toLocaleDateString('pt-BR') : 'Nunca'}</p>
            <p><strong>⏱️ Dias sem vender:</strong> ${diasSemVenda >= 999 ? 'Nunca' : diasSemVenda + ' dias'}</p>
            <p><strong>📊 Vendas (30d):</strong> ${Math.round(vendas30dias)} un</p>
            ${primeiroLote.dataCriacao && (Date.now() - primeiroLote.dataCriacao) < 7 * 86400000 ? `<p><strong>🆕 Item novo!</strong> Adicionado recentemente</p>` : ''}
        `;
        
        setTimeout(() => {
            renderizarGrafico(lotes.flatMap(l => l.historico || []));
        }, 100);
        
        const comValidade = lotes.filter(l => l.done && l.validade && !l.semVencimento);
        const comSemVencimento = lotes.filter(l => l.semVencimento === true);
        
        const lotesPorValidade = new Map();
        comValidade.forEach(l => {
            const key = l.validade;
            if (!lotesPorValidade.has(key)) lotesPorValidade.set(key, { validade: key, qtde: 0, ids: [], semVencimento: false });
            const grupo = lotesPorValidade.get(key);
            grupo.qtde += l.qtde || 0;
            grupo.ids.push(Object.keys(inventario).find(k => inventario[k] === l));
        });
        
        comSemVencimento.forEach(l => {
            const key = "SEM VENCIMENTO";
            if (!lotesPorValidade.has(key)) lotesPorValidade.set(key, { validade: "♾️ SEM VENCIMENTO", qtde: 0, ids: [], semVencimento: true });
            const grupo = lotesPorValidade.get(key);
            grupo.qtde += l.qtde || 0;
            grupo.ids.push(Object.keys(inventario).find(k => inventario[k] === l));
        });
        
        const lotesList = document.getElementById('lotesList');
        if (lotesPorValidade.size > 0) {
            lotesList.innerHTML = Array.from(lotesPorValidade.values()).map(grupo => `
                <div class="lote-item">
                    <div class="lote-info">
                        <div class="lote-validade ${grupo.semVencimento ? 'sem-vencimento' : ''}">${grupo.validade}</div>
                        <div class="lote-qtd">${Math.round(grupo.qtde)} unidades</div>
                    </div>
                    <button class="btn-remover" onclick="removerLotes('${grupo.ids.join(',')}')">✕</button>
                </div>
            `).join('');
        } else {
            lotesList.innerHTML = '<div style="text-align:center; padding:15px;">Nenhum lote com validade</div>';
        }
        
        const historicoList = document.getElementById('historicoList');
        const todosHistoricos = lotes.flatMap(l => (l.historico || []).map(h => ({ ...h, desc: l.desc })))
            .sort((a, b) => b.data - a.data).slice(0, 15);
        
        if (todosHistoricos.length > 0) {
            historicoList.innerHTML = todosHistoricos.map(h => {
                const data = new Date(h.data).toLocaleDateString('pt-BR');
                const tipo = h.tipo === 'venda' ? 'Venda' : (h.tipo === 'reposicao' ? 'Reposição' : (h.tipo === 'validade_atribuida' ? 'Validade' : 'Importação'));
                const sinal = h.tipo === 'venda' ? '▼' : (h.tipo === 'reposicao' ? '▲' : '•');
                const classe = h.tipo === 'venda' ? 'negativo' : (h.tipo === 'reposicao' ? 'positivo' : '');
                return `<div class="historico-item">
                    <span class="historico-data">${data}</span>
                    <span>${tipo}</span>
                    <span class="historico-qtd ${classe}">${sinal} ${Math.abs(Math.round(h.quantidade || 0))} un</span>
                </div>`;
            }).join('');
        } else {
            historicoList.innerHTML = '<div style="text-align:center; padding:15px;">Sem histórico</div>';
        }
        
        if (totalPendente > 0) {
            document.getElementById('inputContainer').innerHTML = `
                <div style="margin:15px 0;">
                    <label style="font-weight:600;">📦 Quantidade a validar (disponível: ${Math.round(totalPendente)}):</label>
                    <input type="number" id="inputQuantidade" class="modal-input" placeholder="Quantidade" min="1" max="${Math.round(totalPendente)}" value="${Math.round(totalPendente)}" inputmode="numeric">
                </div>
                <div style="margin:15px 0;">
                    <label style="font-weight:600;">📅 Data de validade (MM/AAAA):</label>
                    <input type="text" id="inputMesAno" class="modal-input" placeholder="MM/AAAA" maxlength="7" inputmode="numeric">
                </div>
                <div class="dica-enter">Digite a data e clique em ADICIONAR</div>
                <button class="btn-salvar" onclick="salvarValidade()">ADICIONAR VALIDADE</button>
                <button class="btn-sem-vencimento" onclick="salvarSemVencimento()">♾️ SEM VENCIMENTO</button>
            `;
        } else {
            document.getElementById('inputContainer').innerHTML = `<div style="text-align:center; padding:15px; background:var(--bg-primary); border-radius:12px; margin-top:15px;"><i class="fas fa-check-circle" style="color:var(--success);"></i> Todos os lotes já possuem validade ou são sem vencimento!</div>`;
        }
        
        document.getElementById('modalData').style.display = 'flex';
        
        const inputData = document.getElementById('inputMesAno');
        if (inputData) {
            inputData.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, "");
                if (v.length >= 2) v = v.substring(0,2) + "/" + v.substring(2,6);
                e.target.value = v;
            });
        }
    };
    
    window.salvarValidade = async () => {
        const quantidade = parseInt(document.getElementById('inputQuantidade')?.value);
        const data = document.getElementById('inputMesAno')?.value;
        
        if (!quantidade || quantidade <= 0) {
            mostrarToast('Digite uma quantidade válida', 'warning');
            return;
        }
        if (!data || data.length < 7 || !/^\d{2}\/\d{4}$/.test(data)) {
            mostrarToast('Digite a validade no formato MM/AAAA', 'warning');
            return;
        }
        
        const dataSalvar = "01/" + data;
        
        const itensPendentes = Object.entries(inventario)
            .filter(([_, item]) => item.codigo === codigoAtual && !item.done && !item.semVencimento && item.qtde > 0)
            .sort((a, b) => (a[1].dataCriacao || 0) - (b[1].dataCriacao || 0));
        
        if (itensPendentes.length === 0) {
            mostrarToast('Todos os lotes já têm validade', 'info');
            fecharModal();
            return;
        }
        
        const totalPendente = itensPendentes.reduce((acc, [_, item]) => acc + (item.qtde || 0), 0);
        if (quantidade > totalPendente) {
            mostrarToast(`Quantidade indisponível. Total pendente: ${Math.round(totalPendente)}`, 'warning');
            return;
        }
        
        let updates = {};
        let quantidadeRestante = quantidade;
        const now = Date.now();
        
        const primeiroPendente = itensPendentes[0][1];
        
        const novoId = gerarIdValido(`${codigoAtual}_VAL`, now, Math.random().toString(36).substring(2, 8));
        
        const historicoNovo = [
            ...(primeiroPendente.historico || []),
            { 
                data: now, 
                tipo: 'validade_atribuida', 
                quantidade: quantidade, 
                validade: dataSalvar 
            }
        ];
        
        updates[novoId] = {
            codigo: codigoAtual,
            desc: primeiroPendente.desc,
            qtde: quantidade,
            endereco: primeiroPendente.endereco,
            estoqueMinimo: primeiroPendente.estoqueMinimo || 0,
            origem: 'estoque',
            done: true,
            validade: dataSalvar,
            semVencimento: false,
            dataCriacao: primeiroPendente.dataCriacao || now,
            historico: historicoNovo
        };
        
        for (let [id, item] of itensPendentes) {
            if (quantidadeRestante <= 0) break;
            
            const qtdDisponivel = item.qtde || 0;
            
            if (qtdDisponivel <= quantidadeRestante) {
                updates[id] = null;
                quantidadeRestante -= qtdDisponivel;
            } else {
                updates[id] = {
                    ...item,
                    qtde: qtdDisponivel - quantidadeRestante
                };
                quantidadeRestante = 0;
            }
        }
        
        await estoqueRef.update(updates);
        mostrarToast(`${quantidade} unidades com validade ${data} adicionadas!`, 'success');
        fecharModal();
    };
    
    window.salvarSemVencimento = async () => {
        const quantidade = parseInt(document.getElementById('inputQuantidade')?.value);
        
        if (!quantidade || quantidade <= 0) {
            mostrarToast('Digite uma quantidade válida', 'warning');
            return;
        }
        
        const itensPendentes = Object.entries(inventario)
            .filter(([_, item]) => item.codigo === codigoAtual && !item.done && !item.semVencimento && item.qtde > 0)
            .sort((a, b) => (a[1].dataCriacao || 0) - (b[1].dataCriacao || 0));
        
        if (itensPendentes.length === 0) {
            mostrarToast('Todos os lotes já têm validade', 'info');
            fecharModal();
            return;
        }
        
        const totalPendente = itensPendentes.reduce((acc, [_, item]) => acc + (item.qtde || 0), 0);
        if (quantidade > totalPendente) {
            mostrarToast(`Quantidade indisponível. Total pendente: ${Math.round(totalPendente)}`, 'warning');
            return;
        }
        
        let updates = {};
        let quantidadeRestante = quantidade;
        const now = Date.now();
        
        const primeiroPendente = itensPendentes[0][1];
        
        const novoId = gerarIdValido(`${codigoAtual}_SEM_VAL`, now, Math.random().toString(36).substring(2, 8));
        
        const historicoNovo = [
            ...(primeiroPendente.historico || []),
            { 
                data: now, 
                tipo: 'validade_atribuida', 
                quantidade: quantidade, 
                validade: 'SEM VENCIMENTO' 
            }
        ];
        
        updates[novoId] = {
            codigo: codigoAtual,
            desc: primeiroPendente.desc,
            qtde: quantidade,
            endereco: primeiroPendente.endereco,
            estoqueMinimo: primeiroPendente.estoqueMinimo || 0,
            origem: 'estoque',
            done: true,
            validade: 'SEM VENCIMENTO',
            semVencimento: true,
            dataCriacao: primeiroPendente.dataCriacao || now,
            historico: historicoNovo
        };
        
        for (let [id, item] of itensPendentes) {
            if (quantidadeRestante <= 0) break;
            
            const qtdDisponivel = item.qtde || 0;
            
            if (qtdDisponivel <= quantidadeRestante) {
                updates[id] = null;
                quantidadeRestante -= qtdDisponivel;
            } else {
                updates[id] = {
                    ...item,
                    qtde: qtdDisponivel - quantidadeRestante
                };
                quantidadeRestante = 0;
            }
        }
        
        await estoqueRef.update(updates);
        mostrarToast(`${quantidade} unidades marcadas como SEM VENCIMENTO!`, 'success');
        fecharModal();
    };
    
    window.removerLotes = async (idsString) => {
        if (!confirm('Remover estes lotes? Os registros serão perdidos.')) return;
        const ids = idsString.split(',');
        let updates = {};
        ids.forEach(id => { updates[id] = null; });
        await estoqueRef.update(updates);
        mostrarToast(`${ids.length} lote(s) removidos`, 'success');
        fecharModal();
    };
    
    window.fecharModal = () => {
        document.getElementById('modalData').style.display = 'none';
        if (grafico) { grafico.destroy(); grafico = null; }
        codigoAtual = null;
    };
    
    function renderizarGrafico(historico) {
        const canvas = document.getElementById('graficoVendas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const ultimos6meses = [];
        const hoje = new Date();
        for (let i = 5; i >= 0; i--) {
            const data = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
            const mes = data.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '');
            ultimos6meses.push({ mes, vendas: 0, reposicoes: 0 });
        }
        historico.forEach(h => {
            if (!h) return;
            const dataH = new Date(h.data);
            const diffMeses = (hoje.getFullYear() - dataH.getFullYear()) * 12 + (hoje.getMonth() - dataH.getMonth());
            if (diffMeses >= 0 && diffMeses < 6) {
                const index = 5 - diffMeses;
                if (h.tipo === 'venda') ultimos6meses[index].vendas += Math.abs(h.quantidade || 0);
                else if (h.tipo === 'reposicao') ultimos6meses[index].reposicoes += h.quantidade || 0;
            }
        });
        if (grafico) grafico.destroy();
        grafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ultimos6meses.map(m => m.mes),
                datasets: [
                    { label: 'Vendas', data: ultimos6meses.map(m => m.vendas), backgroundColor: '#ef4444', borderRadius: 4 },
                    { label: 'Reposições', data: ultimos6meses.map(m => m.reposicoes), backgroundColor: '#10b981', borderRadius: 4 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { mode: 'index' } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } }, x: { grid: { display: false } } } }
        });
    }
    
    window.aplicarFiltro = (filtro) => {
        filtroAtual = filtro;
        document.querySelectorAll('.filtro-btn').forEach(btn => btn.classList.remove('active'));
        const btnAtivo = document.querySelector(`.filtro-btn[data-filtro="${filtro}"]`);
        if (btnAtivo) btnAtivo.classList.add('active');
        
        const texts = { 
            todos: 'TODOS OS PRODUTOS', 
            pendente: 'APENAS PENDENTES', 
            concluido: 'APENAS CONCLUÍDOS',
            'sem-vencimento': 'SEM VENCIMENTO',
            novos: '🆕 NOVOS ITENS (última importação)'
        };
        document.getElementById('filterText').innerHTML = `Mostrando: ${texts[filtro] || 'TODOS'}`;
        renderizarLista();
    };
    
    function atualizarStatus() {
        const lotes = Object.values(inventario);
        const pendentes = lotes.filter(l => !l.done && !l.semVencimento).length;
        
        document.getElementById('stat-lotes').innerText = lotes.length;
        document.getElementById('stat-pendentes').innerText = pendentes;
    }
    
    // ===== FUNÇÃO RENDERIZAR LISTA =====
    function renderizarLista() {
        const container = document.getElementById('lista-estoque');
        const ordenarPor = document.getElementById('ordenarPor').value;
        
        const grupos = new Map();
        Object.values(inventario).forEach(item => {
            if (!grupos.has(item.codigo)) {
                grupos.set(item.codigo, { ...item, lotes: [item], qtde: item.qtde || 0 });
            } else {
                const ex = grupos.get(item.codigo);
                ex.lotes.push(item);
                ex.qtde += item.qtde || 0;
            }
        });
        
        let produtos = Array.from(grupos.values());
        
        produtos.forEach(prod => {
            prod.temPendente = prod.lotes.some(l => !l.done && !l.semVencimento);
            prod.temConcluido = prod.lotes.some(l => l.done && !l.semVencimento);
            prod.temSemVencimento = prod.lotes.some(l => l.semVencimento === true);
            prod.ehNovo = prod.dataCriacao && prod.dataCriacao >= ultimaImportacao && ultimaImportacao > 0 && prod.temPendente;
            const loteComEndereco = prod.lotes.find(l => l.endereco && l.endereco !== 'S/E' && l.endereco !== '');
            prod.enderecoExibir = loteComEndereco?.endereco || prod.endereco || 'S/E';
            prod.qtde = Math.round(prod.qtde);
        });
        
        if (filtroAtual !== 'todos') {
            produtos = produtos.filter(prod => {
                if (filtroAtual === 'pendente') return prod.temPendente && !prod.temConcluido && !prod.temSemVencimento;
                if (filtroAtual === 'concluido') return prod.temConcluido && !prod.temPendente && !prod.temSemVencimento;
                if (filtroAtual === 'sem-vencimento') return prod.temSemVencimento && !prod.temPendente;
                if (filtroAtual === 'novos') return prod.ehNovo;
                return true;
            });
        }
        
        produtos.sort((a, b) => {
            switch(ordenarPor) {
                case 'quantidade': return (b.qtde || 0) - (a.qtde || 0);
                case 'quantidade-menor': return (a.qtde || 0) - (b.qtde || 0);
                case 'codigo': return (a.codigo || '').localeCompare(b.codigo || '');
                case 'nome': return (a.desc || '').localeCompare(b.desc || '');
                case 'data': return (b.dataCriacao || 0) - (a.dataCriacao || 0);
                default: return (b.qtde || 0) - (a.qtde || 0);
            }
        });
        
        document.getElementById('result-count').innerText = `${produtos.length} itens`;
        if (produtos.length === 0) { 
            container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>Nenhum produto encontrado</p></div>`; 
            return; 
        }
        
        container.innerHTML = produtos.map(prod => {
            let status = 'pendente';
            let statusText = 'Pendente';
            let statusClass = 'status-pendente';
            
            if (prod.ehNovo) {
                status = 'novo';
                statusText = '🆕 Novo';
                statusClass = 'status-novo';
            } else if (prod.temSemVencimento && !prod.temPendente) {
                status = 'sem-vencimento';
                statusText = '♾️ Sem Vencimento';
                statusClass = 'status-sem-vencimento';
            } else if (prod.temConcluido && !prod.temPendente && !prod.temSemVencimento) {
                status = 'concluido';
                statusText = 'Concluído';
                statusClass = 'status-concluido';
            }
            
            const badgeNovo = prod.ehNovo ? '<span class="badge-novo">🆕 NOVO</span>' : '';
            
            return `<div class="produto-item ${status}" onclick="abrirModal('${prod.codigo}')">
                <div class="produto-header">
                    <span class="produto-codigo">📦 ${prod.codigo} ${badgeNovo}</span>
                    <span class="produto-status ${statusClass}">${statusText}</span>
                </div>
                <div class="produto-desc">${(prod.desc || 'Sem descrição').substring(0, 60)}${prod.desc?.length > 60 ? '...' : ''}</div>
                <div class="produto-detalhes">
                    <span><i class="fas fa-box"></i> ${Math.round(prod.qtde)} un</span>
                </div>
                ${prod.enderecoExibir && prod.enderecoExibir !== 'S/E' ? `<div class="produto-endereco"><i class="fas fa-map-marker-alt"></i> ${prod.enderecoExibir}</div>` : ''}
                ${prod.estoqueMinimo > 0 ? `<div class="produto-detalhes"><span><i class="fas fa-chart-line"></i> Mínimo: ${Math.round(prod.estoqueMinimo)}</span></div>` : ''}
            </div>`;
        }).join('');
    }
    
    window.exportarRelatorio = () => {
        const grupos = new Map();
        Object.values(inventario).forEach(item => {
            if (!grupos.has(item.codigo)) {
                grupos.set(item.codigo, { ...item, quantidade: item.qtde || 0 });
            } else {
                grupos.get(item.codigo).quantidade += item.qtde || 0;
            }
        });
        
        const produtos = Array.from(grupos.values());
        let csv = "Código;Descrição;Endereço;Quantidade;Status;Validade;NovoItem\n";
        produtos.forEach(p => {
            let status = 'Pendente';
            let validade = '';
            let novoItem = 'Não';
            if (p.semVencimento) {
                status = 'Sem Vencimento';
                validade = 'SEM VENCIMENTO';
            } else if (p.done && p.validade) {
                status = 'Concluído';
                validade = p.validade;
            }
            if (p.dataCriacao && p.dataCriacao >= ultimaImportacao && ultimaImportacao > 0 && !p.done && !p.semVencimento) {
                novoItem = 'Sim';
            }
            const endereco = p.lotes && p.lotes.length > 0 && p.lotes[0].endereco ? p.lotes[0].endereco : (p.endereco || 'S/E');
            csv += `${p.codigo};${p.desc || ''};${endereco};${Math.round(p.quantidade)};${status};${validade};${novoItem}\n`;
        });
        
        const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `produtos_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
        mostrarToast('Relatório exportado com sucesso!', 'success');
    };
</script>
</body>
</html>
